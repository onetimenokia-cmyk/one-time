<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nokia Tracker — Sign In</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f0f2f7;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      border: 1px solid #e5e7eb;
      padding: clamp(1.5rem, 4vw, 2.5rem) clamp(1rem, 4vw, 2rem);
      width: 100%;
      max-width: 420px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    }

    .brand {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-bottom: clamp(1.5rem, 3vw, 2rem);
    }

    .brand-logo {
      width: clamp(36px, 6vw, 44px);
      height: clamp(36px, 6vw, 44px);
      border-radius: 10px;
      background: #2563eb;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
      font-size: clamp(12px, 2vw, 15px);
      color: #fff;
      flex-shrink: 0;
      letter-spacing: 0.5px;
    }

    .brand-text {
      display: flex;
      flex-direction: column;
    }

    .brand-name {
      font-size: clamp(16px, 3vw, 20px);
      font-weight: 600;
      color: #111827;
      line-height: 1.2;
    }

    .brand-sub {
      font-size: clamp(10px, 1.8vw, 12px);
      color: #9ca3af;
      font-weight: 400;
      letter-spacing: 0.5px;
    }

    .heading {
      text-align: center;
      margin-bottom: clamp(1.25rem, 3vw, 1.75rem);
    }

    .heading h1 {
      font-size: clamp(17px, 3vw, 20px);
      font-weight: 600;
      color: #111827;
      margin-bottom: 4px;
    }

    .heading p {
      font-size: clamp(12px, 2vw, 13px);
      color: #6b7280;
    }

    .field {
      margin-bottom: 0.875rem;
    }

    .field label {
      display: block;
      font-size: clamp(12px, 2vw, 13px);
      color: #374151;
      margin-bottom: 5px;
      font-weight: 500;
    }

    .field input {
      width: 100%;
      height: clamp(40px, 6vw, 44px);
      border: 1px solid #d1d5db;
      border-radius: 8px;
      padding: 0 14px;
      font-size: clamp(13px, 2.5vw, 15px);
      color: #111827;
      background: #fff;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
      -webkit-appearance: none;
      font-family: inherit;
    }

    .field input:focus {
      border-color: #2563eb;
      box-shadow: 0 0 0 3px rgba(37,99,235,0.12);
    }

    .field input::placeholder {
      color: #9ca3af;
    }

    .error-msg {
      display: none;
      background: #fef2f2;
      border: 1px solid #fecaca;
      color: #dc2626;
      font-size: 13px;
      padding: 8px 12px;
      border-radius: 8px;
      margin-bottom: 12px;
      text-align: center;
    }

    .error-msg.show { display: block; }

    .btn-login {
      width: 100%;
      height: clamp(42px, 6vw, 46px);
      background: #2563eb;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: clamp(14px, 2.5vw, 15px);
      font-weight: 600;
      cursor: pointer;
      margin-top: 0.5rem;
      transition: background 0.15s, transform 0.1s;
      -webkit-tap-highlight-color: transparent;
      font-family: inherit;
      letter-spacing: 0.2px;
    }

    .btn-login:hover { background: #1d4ed8; }
    .btn-login:active { background: #1e40af; transform: scale(0.99); }
    .btn-login:disabled { background: #93c5fd; cursor: not-allowed; }

    .loading { display: none; }
    .btn-login.loading-state .btn-text { display: none; }
    .btn-login.loading-state .loading { display: inline; }

    @media (max-width: 480px) {
      body { align-items: flex-start; padding-top: 2.5rem; }
      .card { border-radius: 12px; }
    }

    @media (min-width: 1024px) {
      body { min-height: 100vh; }
    }
  </style>
</head>
<body>

  <div class="card">
    <div class="brand">
      <div class="brand-logo">NT</div>
      <div class="brand-text">
        <span class="brand-name">Nokia Tracker</span>
        <span class="brand-sub">One Time</span>
      </div>
    </div>

    <div class="heading">
      <h1>Sign In</h1>
      <p>Enter your credentials to continue</p>
    </div>

    <div class="error-msg" id="errorMsg">Invalid username or password</div>

    <div class="field">
      <label for="username">Username</label>
      <input
        type="text"
        id="username"
        placeholder="Enter username"
        autocomplete="username"
        autocorrect="off"
        autocapitalize="none"
        spellcheck="false"
      />
    </div>

    <div class="field">
      <label for="password">Password</label>
      <input
        type="password"
        id="password"
        placeholder="••••••••"
        autocomplete="current-password"
      />
    </div>

    <button class="btn-login" id="loginBtn" onclick="handleLogin()">
      <span class="btn-text">Sign In</span>
      <span class="loading">Signing in...</span>
    </button>
  </div>

  <script>
    // ============================================================
    // CONFIG — Users loaded from Google Sheets
    // Replace this with Google Sheets API call in production
    // ============================================================
    const USERS = [
      { username: 'karim',  password: 'karim123',  role: 'admin',        name: 'Karim BooKa',    company: 'All' },
      { username: 'helal',  password: 'helal123',  role: 'supervisor',   name: 'Helal',          company: 'All' },
      { username: 'njv',    password: 'njv123',    role: 'company',      name: 'Ahmed NJV',      company: 'NJV' },
      { username: 'amc',    password: 'amc123',    role: 'company',      name: 'Omar AMC',       company: 'AMC' },
      { username: 'eng1',   password: 'eng123',    role: 'site_engineer',name: 'Mohammed',       company: 'NJV' },
    ];

    // ============================================================
    // LOGIN HANDLER
    // ============================================================
    function handleLogin() {
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const btn      = document.getElementById('loginBtn');
      const errorMsg = document.getElementById('errorMsg');

      errorMsg.classList.remove('show');

      if (!username || !password) {
        errorMsg.textContent = 'Please enter username and password';
        errorMsg.classList.add('show');
        return;
      }

      btn.disabled = true;
      btn.classList.add('loading-state');

      setTimeout(() => {
        const user = USERS.find(u =>
          u.username.toLowerCase() === username.toLowerCase() &&
          u.password === password
        );

        if (user) {
          sessionStorage.setItem('nt_user', JSON.stringify({
            username: user.username,
            name:     user.name,
            role:     user.role,
            company:  user.company,
          }));
          window.location.href = 'dashboard.html';
        } else {
          errorMsg.textContent = 'Invalid username or password';
          errorMsg.classList.add('show');
          btn.disabled = false;
          btn.classList.remove('loading-state');
        }
      }, 800);
    }

    // Allow Enter key to submit
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') handleLogin();
    });

    // Redirect if already logged in
    if (sessionStorage.getItem('nt_user')) {
      window.location.href = 'dashboard.html';
    }
  </script>

</body>
</html>
