<script type="text/babel">
const {useState,useMemo,useRef,useCallback,useEffect}=React;

// LocalStorage persistence helper - بيحفظ ويسترجع البيانات تلقائياً
function usePersistedState(key,initialValue){
  const [value,setValue]=useState(()=>{
    try{
      const stored=localStorage.getItem('nokia_'+key);
      if(stored===null) return initialValue;
      return JSON.parse(stored);
    }catch(e){console.error('localStorage read error for '+key,e);return initialValue;}
  });
  useEffect(()=>{
    try{localStorage.setItem('nokia_'+key,JSON.stringify(value));}
    catch(e){console.error('localStorage write error for '+key,e);}
  },[key,value]);
  return [value,setValue];
}

function Badge({s}){const m={Done:'bd',Pending:'bp','In Progress':'bi','Not Confirmed':'bn'};return <span className={'badge '+(m[s]||'bn')}>{s||'—'}</span>;}
function PhotoDots({p}){return <div className="photo-dots">{['before','after','serial','general'].map(k=><span key={k} className="pd" style={{background:p[k]>0?'#22c55e':'#e2e8f0'}}/>)}</div>;}
function initials(n){return n.split(' ').map(w=>w[0]).join('').substring(0,2).toUpperCase();}
function tsNow(){return new Date().toLocaleTimeString('en',{hour:'2-digit',minute:'2-digit',second:'2-digit'});}
function dateNow(){return new Date().toLocaleDateString('ar-EG',{year:'numeric',month:'2-digit',day:'2-digit'});}
function dateTimeNow(){return new Date().toLocaleDateString('ar-EG',{year:'numeric',month:'2-digit',day:'2-digit'});}
function fileToBase64(file){return new Promise((resolve,reject)=>{const r=new FileReader();r.onload=()=>resolve(r.result.split(',')[1]);r.onerror=()=>reject(new Error('Read failed'));r.readAsDataURL(file);});}

function LoginPage({users,onLogin}){
  const [u,setU]=useState('');const [p,setP]=useState('');const [err,setErr]=useState('');
  function doLogin(e){e.preventDefault();const found=users.find(x=>x.username===u.trim()&&x.password===p);found?onLogin(found):setErr('اسم المستخدم أو كلمة السر غلط');}
  return(
    <div className="login-page">
      <div className="login-card">
        <div className="login-logo"><div className="login-logo-icon">NK</div><div className="login-logo-text">Nokia Link Tracker</div></div>
        <div className="login-title">تسجيل الدخول</div>
        <div className="login-sub">أدخل بيانات الدخول الخاصة بك</div>
        {err&&<div className="login-err">{err}</div>}
        <form onSubmit={doLogin}>
          <div className="login-fg"><label>اسم المستخدم</label><input value={u} onChange={e=>setU(e.target.value)} placeholder="karim" autoFocus/></div>
          <div className="login-fg"><label>كلمة السر</label><input type="password" value={p} onChange={e=>setP(e.target.value)} placeholder="••••••••"/></div>
          <button type="submit" className="login-btn">دخول</button>
        </form>
        <div className="demo-box">
          <div style={{fontWeight:700,marginBottom:6,color:'var(--text2)'}}>حسابات تجريبية (اضغط للملء):</div>
          {[['karim','karim123','Admin — كل الصفحات'],['helal','helal123','مشرف — داشبورد + إضافة'],['njv','njv123','شركة NJV فقط'],['amc','amc123','شركة AMC فقط'],['eng1','eng123','🔧 مهندس موقع — يعدل بتاعته بس']].map(([un,pw,role])=>
            <div key={un} className="demo-row" onClick={()=>{setU(un);setP(pw);}}>
              <span style={{minWidth:55,color:'#005AFF',fontWeight:700}}>{un}</span>
              <span style={{minWidth:75,fontFamily:'monospace'}}>{pw}</span>

  const totalPhotos=()=>Object.values(photoFiles).reduce((s,a)=>s+(Array.isArray(a)?a.length:0),0);

  async function sendToWebhook(row, type='new', extraInfo={}){
    if(!webhookUrl){console.warn('sendToWebhook: no webhookUrl set');return null;}
    try{
      var addedByName='';
      var addedByUser=users.find(function(u){return u.id===row.addedById;});
      if(addedByUser) addedByName=addedByUser.name;
      var assignedNames=(row.assignedTo||[]).map(function(uid){
        var u=users.find(function(x){return x.id===uid;});
        return u?u.name:'';
      }).filter(Boolean).join(' | ');
      var photos=row.photos||{};
      // الـ client بيولّد task_id بنفسه عشان no-cors ما بيرجعش response قابل للقراءة
      var clientTaskId='task-'+Date.now()+'-'+Math.random().toString(36).slice(2,8);
      const payload={
        client_task_id: clientTaskId,
        linkId: row.linkId,
        linkConfig: row.linkConfig||'',
        scope: row.scope||'',
        nrSite: row.siteId||'',
        nrSiteId: row.siteId||'',
        feSite: row.feSite||'',
        feSiteId: row.feSite||'',
        company: row.company,
        area: row.area,
        status: row.status,
        migration: row.migration||'',
        tg: row.tg||'',
        owner: row.owner,
        note: row.note||'',
        dateAdded: row.dateAdded||'',
        addDate: row.dateAdded||dateTimeNow(),
        addedBy: addedByName,
        lastEditDate: (row.editLog||[]).length>0?(row.editLog[row.editLog.length-1].date):'',
        editsCount: (row.editLog||[]).length,
        lastCompletionDate: (row.completions||[]).length>0?(row.completions[row.completions.length-1].date):'',
        completionsCount: (row.completions||[]).length,
        completionDates: (row.completions||[]).map(function(c){return c.date;}).join(' | ')||'',
        transfersCount: (row.transfers||[]).length,
        transfersHistory: (row.transfers||[]).map(function(t){return t.from+'→'+t.to+' ('+t.date+')';}).join(' | ')||'',
        assignedEngineers: assignedNames,
        photoNRBefore: photos.nr_before||0,
        photoNRAfter: photos.nr_after||0,
        photoNRSerial: photos.nr_serial||0,
        photoNRGeneral: photos.nr_general||0,
        photoFEBefore: photos.fe_before||0,
        photoFEAfter: photos.fe_after||0,
        photoFESerial: photos.fe_serial||0,
        photoFEGeneral: photos.fe_general||0,
        tgChatId: row.tgChatId||tgIds[row.company]||'',
        storedChats: row.tgChatId?{[row.linkId]:row.tgChatId}:{},
        members: tgMembers||{},
        nrPhotos: {},
        fePhotos: {},
        docsData: [],
        sheetId: sheetId||'',
        type: type,
        ...extraInfo,
      };
      console.log('📤 Sending to webhook (no-cors):',{linkId:payload.linkId,type:payload.type,company:payload.company,task_id:clientTaskId,membersCount:(tgMembers[row.company]||[]).length});
      // mode:'no-cors' يضمن الطلب يوصل للسيرفر مهما كانت إعدادات CORS
      try{
        await fetch(webhookUrl,{method:'POST',mode:'no-cors',body:JSON.stringify(payload)});
        console.log('✅ Request sent. Polling for result...');
      }catch(e){
        console.error('❌ fetch failed even with no-cors:',e);
        if(showToast)showToast('فشل إرسال الطلب: '+e.message,'err');
        return null;
      }
      // Polling عن طريق GET — مش محتاج CORS preflight
      return await pollTaskResult(clientTaskId,row.linkId);
    }catch(e){
      console.error('❌ sendToWebhook exception:',e);
      if(showToast)showToast('خطأ في إرسال اللينك: '+e.message,'err');
      return null;
    }
  }

  async function pollTaskResult(taskId,linkId){
    var taskUrl=webhookUrl.replace(/\/webhook\/?$/,'/task/')+taskId;
    // ندي السيرفر شوية وقت يبدأ، بعدين نسأل لحد ما يخلص (90 ثانية)
    await new Promise(r=>setTimeout(r,2000));
    for(var i=0;i<30;i++){
      try{
        var res=await fetch(taskUrl);
        if(!res.ok){await new Promise(r=>setTimeout(r,3000));continue;}
        var json=await res.json();
        console.log('🔍 poll '+linkId+':',json.status);
        if(json.status==='done'){
          console.log('🎉 Task done for '+linkId+', chat_id:',json.chat_id);
          return json.chat_id;
        }
        if(json.status==='error'){
          console.error('❌ Task failed for '+linkId+':',json.error);
          if(showToast)showToast('فشل '+linkId+': '+json.error,'err');
          return null;
        }
      }catch(e){console.warn('poll error:',e);}
      await new Promise(r=>setTimeout(r,3000));
    }
    console.warn('⏰ Task timeout for '+linkId);
    return null;
  }

  const submittingRef=useRef(false);
  async function submitLink(){
    if(submittingRef.current){console.warn('⚠️ submit ignored: already in progress');return;}
    if(!form.linkId||!form.linkConfig||!form.company||!form.siteId||!form.feSite||!form.owner){
      showToast('من فضلك أكمل كل الحقول الإلزامية (*)','err');return;
    }
    submittingRef.current=true;
    setTimeout(()=>{submittingRef.current=false;},10000); // unlock after 10s as safety
    
    // ✅ FIX 1: Capture state قبل أي حاجة
    const capturedPhotoFiles = {...photoFiles};
    const capturedDocFiles = [...docFiles];
    const capturedForm = {...form};
    
    const pCount={
      nr_before:(capturedPhotoFiles.nr_before||[]).length,nr_after:(capturedPhotoFiles.nr_after||[]).length,
      nr_serial:(capturedPhotoFiles.nr_serial||[]).length,nr_general:(capturedPhotoFiles.nr_general||[]).length,
      fe_before:(capturedPhotoFiles.fe_before||[]).length,fe_after:(capturedPhotoFiles.fe_after||[]).length,
      fe_serial:(capturedPhotoFiles.fe_serial||[]).length,fe_general:(capturedPhotoFiles.fe_general||[]).length
    };
    
    const newRow={...capturedForm,id:Date.now(),tg:webhookUrl?'yes':'NO',photos:pCount,addedById:currentUser.id,dateAdded:dateTimeNow(),completions:[],editLog:[],transfers:[],assignedTo:[],tgChatId:''};

    if(logActivity) logActivity('إضافة لينك', 'أضاف لينك جديد: ' + newRow.linkId + ' (' + newRow.company + ')');
    showToast('✓ تم إضافة اللينك '+capturedForm.linkId);
    
    // ✅ FIX 1: قفل الـ modal فوراً!
    closeModal();
    
    // ✅ الإرسال لتيليجرام يحصل في الخلفية
    if(!webhookUrl){
      console.warn('⚠️ لا يوجد webhookUrl محفوظ — لن يتم إرسال أي شيء لتيليجرام');
      showToast('⚠️ Webhook URL غير مضبوط — اللينك اتحفظ بس مش هيتبعت لتيليجرام','err');
      return;
    }
    
    (async()=>{
      console.log('🚀 submitLink: starting webhook send for',newRow.linkId,'webhookUrl=',webhookUrl);
      var nrPhotos={before:[],after:[],serial:[],general:[]};
      var fePhotos={before:[],after:[],serial:[],general:[]};
      var docsData=[];
      try{
        for(var k of ['before','after','serial','general']){
          for(var f of (capturedPhotoFiles['nr_'+k]||[])){var b=await fileToBase64(f);if(b)nrPhotos[k].push(b);}
          for(var f of (capturedPhotoFiles['fe_'+k]||[])){var b=await fileToBase64(f);if(b)fePhotos[k].push(b);}
        }
        for(var f of (capturedDocFiles||[])){
          try{
            var b=await fileToBase64(f);
            if(b) docsData.push({name:f.name||'document',data:b});
          }catch(e){console.error('doc encoding error for',f.name,e);}
        }
        console.log('📷 photos encoded:',{nr:Object.values(nrPhotos).reduce((s,a)=>s+a.length,0),fe:Object.values(fePhotos).reduce((s,a)=>s+a.length,0),docs:docsData.length});
      }catch(e){console.error('❌ encoding error:',e);}
      try{
        showToast('📡 جاري إرسال '+newRow.linkId+' لتيليجرام...');
        var chatId=await sendToWebhook(newRow,'new',{
          addedBy:currentUser.name,
          addDate:dateTimeNow(),
          totalPhotos:Object.values(pCount).reduce((s,v)=>s+v,0),
          nrPhotos,fePhotos,docsData,
          nrSiteId:newRow.siteId||'',
          feSiteId:newRow.feSite||'',
        });
        if(chatId){
          console.log('✅ chat_id received:',chatId);
          setData(d=>d.map(r=>r.id===newRow.id?{...r,tgChatId:chatId}:r));
          showToast('✅ جروب '+newRow.linkId+' اتعمل على تيليجرام');
        }else{
          console.warn('⚠️ no chat_id returned for',newRow.linkId);
          showToast('⚠️ '+newRow.linkId+' اتحفظ بس فشل إنشاء جروب — افتح Console (F12)','err');
        }
      }catch(e){
        console.error('❌ sendToWebhook call failed:',e);
        showToast('❌ خطأ في إرسال '+newRow.linkId+': '+e.message,'err');
      }
    })();
  }

    setUploadSteps([]);setUploadProgress(0);setUploadDone(false);setUploading(false);
  }

  function saveEdit(){
    if(!editForm.linkId) return;
    
    // ✅ Capture state قبل closeModal
    const capturedEditPhotoFiles = {...editPhotoFiles};
    const capturedEditDocFiles = [...editDocFiles];
    const capturedEditForm = {...editForm};
    const capturedEditRow = {...editRow};
    
    const editEntry={date:dateTimeNow(),by:currentUser.name,changes:[]};
    // detect what changed
    const fields={linkId:'Link ID',company:'الشركة',area:'المنطقة',status:'الحالة',migration:'Migration',owner:'مهندس الموقع',tg:'تيليجرام',note:'ملاحظات'};
    Object.keys(fields).forEach(k=>{
      if(capturedEditRow[k]!==capturedEditForm[k]) editEntry.changes.push(fields[k]+': '+capturedEditRow[k]+' ← '+capturedEditForm[k]);
    });
    
    const updatedRow={...capturedEditRow,...capturedEditForm,editLog:[...(capturedEditRow.editLog||[]),editEntry]};
    setData(d=>d.map(r=>r.id===capturedEditRow.id?updatedRow:r));
    
    showToast('✓ تم تعديل '+capturedEditForm.linkId);
    if(logActivity)logActivity('تعديل لينك','عدل اللينك: '+capturedEditForm.linkId+(editEntry.changes.length?' — التغييرات: '+editEntry.changes.join(' | '):''));
    
    // ✅ قفل الـ modal فوراً
    setShowEditModal(false);
    
    // ✅ إرسال التعديلات + الصور + الـ docs في الخلفية
    (async()=>{
      try{
        var nrPhotos={before:[],after:[],serial:[],general:[]};
        var fePhotos={before:[],after:[],serial:[],general:[]};
        var docsData=[];
        
        // تحويل الصور لـ base64
        const hasPhotos = Object.values(capturedEditPhotoFiles).some(arr=>arr&&arr.length>0);
        if(hasPhotos){
          console.log('📷 Encoding edit photos...');
          for(var k of ['before','after','serial','general']){
            for(var f of (capturedEditPhotoFiles['nr_'+k]||[])){var b=await fileToBase64(f);if(b)nrPhotos[k].push(b);}
            for(var f of (capturedEditPhotoFiles['fe_'+k]||[])){var b=await fileToBase64(f);if(b)fePhotos[k].push(b);}
          }
          console.log('✅ Photos encoded:',{nr:Object.values(nrPhotos).reduce((s,a)=>s+a.length,0),fe:Object.values(fePhotos).reduce((s,a)=>s+a.length,0)});
        }
        
        // تحويل الـ docs لـ base64
        if(capturedEditDocFiles.length>0){
          console.log('📄 Encoding '+capturedEditDocFiles.length+' documents...');
          for(var f of capturedEditDocFiles){
            try{
              var b=await fileToBase64(f);
              if(b) docsData.push({name:f.name||'document',data:b});
            }catch(e){console.error('doc encoding error for',f.name,e);}
          }
          console.log('✅ Docs encoded:',docsData.length);
        }
        
        // إرسال للـ webhook
        if(hasPhotos || docsData.length>0){
          showToast('📡 جاري إرسال الصور والملفات لتيليجرام...');
          await sendToWebhook(updatedRow,'update',{
            editedBy:currentUser.name,
            changes:editEntry.changes.join(' | '),
            editDate:editEntry.date,
            nrPhotos,
            fePhotos,
            docsData,
            nrSiteId:updatedRow.siteId||'',
            feSiteId:updatedRow.feSite||'',
          });
          showToast('✅ تم إرسال التحديثات لتيليجرام');
        }else{
          // لو مفيش صور ولا docs، ابعت بس text update
          await sendToWebhook(updatedRow,'update',{
            editedBy:currentUser.name,
            changes:editEntry.changes.join(' | '),
            editDate:editEntry.date
          });
        }
      }catch(e){
        console.error('❌ saveEdit webhook error:',e);
        showToast('⚠️ فشل إرسال التحديثات لتيليجرام','err');
      }
    })();
  }

  function handleEditFiles(type,files){
    const arr=Array.from(files).filter(f=>f.type.startsWith('image/'));
    if(arr.length) setEditPhotoFiles(p=>({...p,[type]:[...(p[type]||[]),...arr]}));
  }
  function clearEditPhotos(type){setEditPhotoFiles(p=>({...p,[type]:[]}));}
  const totalEditPhotos=()=>Object.values(editPhotoFiles).reduce((s,a)=>s+(Array.isArray(a)?a.length:0),0);

  async function sendEditPhotos(){
    const pCount={before:editPhotoFiles.before.length,after:editPhotoFiles.after.length,serial:editPhotoFiles.serial.length,general:editPhotoFiles.general.length};
    setEditUploading(true);setEditUploadProgress(0);setEditUploadSteps([]);setEditUploadDone(false);
    const steps=[
      {t:'تجهيز الصور الجديدة...'},
      {t:'رفع الصور على Google Drive مؤقتاً...'},
      {t:'Make.com استلم الصور...'},
      pCount.before>0&&{t:`إرسال صور "قبل التركيب" (${pCount.before}) كاستكمال...`},
      pCount.after>0&&{t:`إرسال صور "بعد التركيب" (${pCount.after}) كاستكمال...`},
      pCount.serial>0&&{t:`إرسال صور "السيريال" (${pCount.serial}) كاستكمال...`},
      pCount.general>0&&{t:`إرسال صور "عامة" (${pCount.general}) كاستكمال...`},
      {t:'حذف الصور من Google Drive تلقائياً...'},
      {t:`اكتمل! وصلت لجروب ${editForm.linkId} كاستكمال ✅`},
    ].filter(Boolean);
    for(let i=0;i<steps.length;i++){
      await new Promise(r=>setTimeout(r,500));
      setEditUploadSteps(s=>[...s.map(x=>({...x,ok:true})),{...steps[i],ok:false}]);
      setEditUploadProgress(Math.round((i+1)/steps.length*100));
    }
    // Update photo counts + log completion date
    const completionEntry={date:dateTimeNow(),by:currentUser.name,photos:pCount};
    // Convert photos to base64
    var nrPhotos={before:[],after:[],serial:[],general:[]};
    var fePhotos={before:[],after:[],serial:[],general:[]};
    try{
      for(var k of ['before','after','serial','general']){
        for(var f of (editPhotoFiles[k]||[])){var b=await fileToBase64(f);if(b)nrPhotos[k].push(b);}
      }
    }catch(e){console.error('photo encoding error:',e);}
    setData(d=>d.map(r=>{
      if(r.id!==editRow.id) return r;
      const updatedRow={...r,tg:'yes',photos:{
        before:(r.photos.before||0)+pCount.before,
        after:(r.photos.after||0)+pCount.after,
        serial:(r.photos.serial||0)+pCount.serial,
        general:(r.photos.general||0)+pCount.general,
      },completions:[...(r.completions||[]),completionEntry]};
      sendToWebhook(updatedRow,'completion',{
        completionDate:completionEntry.date,
        completionBy:currentUser.name,
        addDate:completionEntry.date,
        newPhotos:Object.values(pCount).reduce((s,v)=>s+v,0),
        nrPhotos,fePhotos,
        nrSiteId:r.siteId||'',
        feSiteId:r.feSite||'',
        completionNumber:(r.completions||[]).length+1,
      });
      return updatedRow;
    }));
    setEditUploading(false);setEditUploadDone(true);
  }

  function exportCSV(){
    const h=['Link ID','NR Site','FE Site','Company','Area','Status','Migration','TG','مهندس الموقع','Note','تاريخ الإضافة','تاريخ آخر استكمال','تاريخ آخر تعديل','عدد الاستكمالات'];
    const rows=filtered.map(r=>[
      r.linkId,
      r.siteId||'',
      r.feSite||'',
      r.company,
      r.area,
      r.status,
      r.migration||'',
      r.tg,
      r.owner,
      r.note||'',
      r.dateAdded||'',
      (r.completions||[]).length>0?(r.completions[r.completions.length-1].date):'',
      (r.editLog||[]).length>0?(r.editLog[r.editLog.length-1].date):'',
      (r.completions||[]).length,
    ]);
    const csv=[h,...rows].map(r=>r.join(',')).join('\n');
    const a=document.createElement('a');a.href=URL.createObjectURL(new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'}));a.download='nokia_links.csv';a.click();
  }

          style={{border:'2px dashed '+(editDocFiles.length?'#16a34a':'var(--border)'),borderRadius:'var(--radius-lg)',padding:'14px 12px',textAlign:'center',cursor:'pointer',background:editDocFiles.length?'#f0fdf4':'var(--bg3)',marginBottom:8,position:'relative'}}>
          {editDocFiles.length>0?<>
            <span style={{position:'absolute',top:7,right:7,background:'#16a34a',color:'#fff',borderRadius:10,padding:'1px 7px',fontSize:9,fontWeight:700}}>{editDocFiles.length}</span>
            <div style={{fontSize:20}}>✅</div>
            <div style={{fontSize:12,fontWeight:700,marginTop:4,color:'#166534'}}>{editDocFiles.length} ملف مرفوع</div>
            <div style={{fontSize:10,color:'var(--text3)',marginTop:2}}>اضغط لإضافة المزيد</div>
          </>:<>
            <div style={{fontSize:24}}>📄</div>
            <div style={{fontSize:12,fontWeight:600,marginTop:6}}>اضغط أو اسحب ملفات Document</div>
            <div style={{fontSize:10,color:'var(--text3)',marginTop:2}}>Excel / Word / PDF — متعدد، اختياري</div>
          </>}
          <input ref={editDocFileRef} type="file" accept=".xlsx,.xls,.doc,.docx,.pdf,.csv" multiple className="file-input" onChange={function(e){handleEditDocFiles(e.target.files);}}/>
        </div>
        {editDocFiles.length>0&&<div style={{display:'flex',flexDirection:'column',gap:5,marginBottom:10}}>
          {editDocFiles.map(function(f,i){
            return <div key={i} style={{display:'flex',alignItems:'center',gap:8,padding:'6px 10px',background:'var(--bg3)',border:'1px solid var(--border)',borderRadius:'var(--radius)',fontSize:11}}>
              <span style={{fontSize:14}}>📄</span>
              <span style={{flex:1,fontWeight:600,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{f.name}</span>
              <span style={{fontSize:9,color:'var(--text3)'}}>{(f.size/1024).toFixed(1)} KB</span>
              <button onClick={function(e){e.stopPropagation();removeEditDoc(i);}} style={{background:'none',border:'1px solid var(--border)',borderRadius:'50%',width:20,height:20,cursor:'pointer',fontSize:10,color:'var(--red)',display:'flex',alignItems:'center',justifyContent:'center'}}>×</button>
            </div>;
          })}
        </div>}

        {currentUser.perms.delete&&<div style={{padding:'10px 12px',background:'#fef2f2',borderRadius:'var(--radius)',border:'1px solid #fecaca',fontSize:11,color:'#991b1b',display:'flex',alignItems:'center',justifyContent:'space-between',marginTop:8}}>
          <span>حذف هذا اللينك نهائياً</span>
          <button className="btn btn-red btn-sm" onClick={()=>{setData(d=>d.filter(r=>r.id!==editRow.id));setShowEditModal(false);showToast('تم حذف '+editRow.linkId);if(logActivity)logActivity('حذف لينك','حذف اللينك: '+editRow.linkId);}}>🗑️ حذف</button>
        </div>}
        <div className="modal-footer">
          <button className="btn" onClick={()=>setShowEditModal(false)}>إلغاء</button>
          <button className="btn btn-blue" onClick={saveEdit}>حفظ التعديلات</button>
        </div>
      </div>
    </div>}

    {showTransferModal&&transferRow&&<div className="modal-bg" onClick={e=>e.target===e.currentTarget&&setShowTransferModal(false)}>
      <div className="modal" style={{width:420}}>
        <h3>🔀 نقل لينك لشركة أخرى</h3>
        <div style={{background:'var(--bg3)',border:'1px solid var(--border)',borderRadius:'var(--radius)',padding:'12px 14px',marginBottom:14}}>
          <div style={{fontSize:11,fontWeight:700,marginBottom:6}}>{transferRow.linkId}</div>
          <div style={{display:'flex',alignItems:'center',gap:8,fontSize:12}}>
            <span style={{color:'var(--text2)'}}>الشركة الحالية:</span>
            <span style={{background:(companies.find(c=>c.id===transferRow.company)||{color:'#64748b'}).color,color:'#fff',padding:'2px 10px',borderRadius:6,fontWeight:700,fontSize:11}}>{transferRow.company}</span>
          </div>
        </div>
        <div className="fg"><label>نقل إلى شركة</label>
          <select value={transferTo} onChange={e=>setTransferTo(e.target.value)}>
            <option value="">-- اختار الشركة الجديدة --</option>
            {companies.filter(c=>c.id!==transferRow.company).map(c=><option key={c.id} value={c.id}>{c.name}</option>)}
          </select>
        </div>
        {transferTo&&<div style={{display:'flex',alignItems:'center',gap:10,padding:'10px 14px',background:'#faf5ff',border:'1px solid #e9d5ff',borderRadius:'var(--radius)',fontSize:12,marginTop:4}}>
          <span style={{fontSize:10,color:'var(--text2)'}}>كانت مع</span>
          <span style={{background:'#dc2626',color:'#fff',padding:'3px 10px',borderRadius:6,fontWeight:700}}>{transferRow.company}</span>
          <span style={{fontSize:10,color:'var(--text2)'}}>وراحت مع</span>
          <span style={{background:'#16a34a',color:'#fff',padding:'3px 10px',borderRadius:6,fontWeight:700}}>{transferTo}</span>
        </div>}
        <div className="modal-footer">
          <button className="btn" onClick={()=>setShowTransferModal(false)}>إلغاء</button>
          <button className="btn btn-blue" onClick={doTransfer} disabled={!transferTo}>🔀 تأكيد النقل</button>
        </div>
      </div>
    </div>}

    {showAssignModal&&assignRow&&users&&<AssignModal
      show={showAssignModal}
      row={assignRow}
      users={users}
      currentUser={currentUser}
      assignSel={assignSel}
      setAssignSel={setAssignSel}
      onClose={()=>setShowAssignModal(false)}
      onSave={saveAssign}
    />}
  </>);
}

function AssignModal({show,row,users,currentUser,assignSel,setAssignSel,onClose,onSave}){
  if(!show||!row) return null;
  var engs=users.filter(u=>u.perms.ownEdit||u.perms.edit);
  function toggle(uid){
    setAssignSel(p=>p.includes(uid)?p.filter(x=>x!==uid):[...p,uid]);
  }
  return <div className="modal-bg" onClick={e=>e.target===e.currentTarget&&onClose()}>
    <div className="modal" style={{width:440}}>
      <h3>👷 تعيين مهندسين: {row.linkId}</h3>
      <div style={{fontSize:11,color:"var(--text2)",marginBottom:10,padding:"8px 10px",background:"var(--bg3)",borderRadius:"var(--radius)",border:"1px solid var(--border)"}}>المهندسون المعينون يقدروا يعدلوا الرابط ده</div>
      <div style={{display:'flex',flexDirection:'column',gap:6,marginTop:10}}>
        {engs.map(u=>{
          var isSel=assignSel.includes(u.id);
          return <div key={u.id} onClick={()=>toggle(u.id)} style={{display:'flex',alignItems:'center',gap:10,padding:'8px 12px',background:isSel?'#fffbeb':'var(--bg3)',border:'1px solid '+(isSel?'#fde047':'var(--border)'),borderRadius:'var(--radius)',cursor:'pointer'}}>
            <div style={{width:30,height:30,borderRadius:'50%',background:u.color,display:'flex',alignItems:'center',justifyContent:'center',color:'#fff',fontSize:10,fontWeight:700}}>{initials(u.name)}</div>
            <div style={{flex:1}}>
              <div style={{fontSize:12,fontWeight:600}}>{u.name}</div>
              <div style={{fontSize:10,color:'var(--text3)'}}>{u.role}</div>
            </div>
            <div style={{width:16,height:16,borderRadius:4,border:'2px solid '+(isSel?'#d97706':'var(--border)'),background:isSel?'#d97706':'transparent',display:'flex',alignItems:'center',justifyContent:'center'}}>
              {isSel&&<span style={{color:'#fff',fontSize:10,fontWeight:700}}>✓</span>}
            </div>
          </div>;
        })}
      </div>
      {assignSel.length>0&&<div style={{margin:'10px 0 0',padding:'8px 12px',background:'#f0fdf4',border:'1px solid #bbf7d0',borderRadius:'var(--radius)',fontSize:11,color:'#166634'}}>
        ✓ {assignSel.length} مهندس معين
      </div>}
      <div className="modal-footer">
        <button className="btn" onClick={onClose}>إلغاء</button>
        <button className="btn btn-blue" onClick={()=>onSave(assignSel)}>حفظ التعيين</button>
      </div>
    </div>
  </div>;
}


function ScopesPage({data,companies,users,scopes:scopesProp}){
  var [filterScope,setFilterScope]=useState('all');
  var [viewRow,setViewRow]=useState(null);
  function onView(r){setViewRow(r);}
  var [filterCompany,setFilterCompany]=useState('all');
  var [filterStatus,setFilterStatus]=useState('all');
  
  var hiddenScopes=(scopesProp||[]).filter(function(s){return s.hidden;}).map(function(s){return s.name;});
  var scopes=[...new Set(data.map(function(r){return r.scope;}).filter(Boolean))].filter(function(s){return !hiddenScopes.includes(s);});
  
  var filtered=data.filter(function(r){return !hiddenScopes.includes(r.scope);});
  if(filterScope!=='all') filtered=filtered.filter(function(r){return r.scope===filterScope;});
  if(filterCompany!=='all') filtered=filtered.filter(function(r){return r.company===filterCompany;});
  if(filterStatus!=='all') filtered=filtered.filter(function(r){return r.status===filterStatus;});
  
  var displayScopes=filterScope==='all'?scopes:[filterScope];
  
  return <>
    <div className="ph">
      <div className="phl"><h1>داشبورد الـ Scopes</h1><p>{scopes.length} Scope مختلف — {filtered.length} لينك</p></div>
    </div>
    
    <div style={{display:'flex',gap:10,marginBottom:14,flexWrap:'wrap',padding:'10px 14px',background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:'var(--radius-lg)'}}>
      <div style={{display:'flex',flexDirection:'column',gap:3,minWidth:160}}>
        <label style={{fontSize:10,fontWeight:600,color:'var(--text2)'}}>Scope</label>
        <select value={filterScope} onChange={function(e){setFilterScope(e.target.value);}} style={{padding:'7px 10px',border:'1px solid var(--border)',borderRadius:'var(--radius)',background:'var(--bg)',fontSize:11,fontFamily:'inherit'}}>
          <option value="all">كل الـ Scopes</option>
          {scopes.map(function(s){return <option key={s} value={s}>{s}</option>;})}
        </select>
      </div>
      <div style={{display:'flex',flexDirection:'column',gap:3,minWidth:140}}>
        <label style={{fontSize:10,fontWeight:600,color:'var(--text2)'}}>الشركة</label>
        <select value={filterCompany} onChange={function(e){setFilterCompany(e.target.value);}} style={{padding:'7px 10px',border:'1px solid var(--border)',borderRadius:'var(--radius)',background:'var(--bg)',fontSize:11,fontFamily:'inherit'}}>
          <option value="all">كل الشركات</option>
          {companies.map(function(c){return <option key={c.id} value={c.id}>{c.name}</option>;})}
        </select>
      </div>
      <div style={{display:'flex',flexDirection:'column',gap:3,minWidth:140}}>
        <label style={{fontSize:10,fontWeight:600,color:'var(--text2)'}}>الحالة</label>
        <select value={filterStatus} onChange={function(e){setFilterStatus(e.target.value);}} style={{padding:'7px 10px',border:'1px solid var(--border)',borderRadius:'var(--radius)',background:'var(--bg)',fontSize:11,fontFamily:'inherit'}}>
          <option value="all">الكل</option>
          <option value="Done">Done</option>
          <option value="Pending">Pending</option>
          <option value="In Progress">In Progress</option>
        </select>
      </div>
      {(filterScope!=='all'||filterCompany!=='all'||filterStatus!=='all')&&<button onClick={function(){setFilterScope('all');setFilterCompany('all');setFilterStatus('all');}} style={{alignSelf:'flex-end',padding:'7px 14px',background:'#fee2e2',color:'#991b1b',border:'1px solid #fca5a5',borderRadius:'var(--radius)',cursor:'pointer',fontSize:11,fontWeight:600}}>✕ مسح الفلاتر</button>}
    </div>

    <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(360px,1fr))',gap:14}}>
      {displayScopes.map(function(scope){
        var rows=filtered.filter(function(r){return r.scope===scope;});
        if(rows.length===0&&filterScope==='all') return null;
        var done=rows.filter(function(r){return r.status==='Done';}).length;
        var pending=rows.filter(function(r){return r.status==='Pending';}).length;
        var tgDone=rows.filter(function(r){return r.tg==='yes';}).length;
        var pct=rows.length?Math.round(done/rows.length*100):0;
        var scopeComps=[...new Set(rows.map(function(r){return r.company;}))];
        
        return <div key={scope} style={{background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:'var(--radius-lg)',overflow:'hidden'}}>
          <div style={{padding:'14px 16px',background:'#eff6ff',borderBottom:'1px solid #bfdbfe'}}>
            <div style={{fontSize:14,fontWeight:700,color:'#1e40af',marginBottom:4}}>{scope}</div>
            <div style={{fontSize:10,color:'var(--text2)'}}>{rows.length} لينك — {pct}% مكتمل</div>
          </div>
          
          <div style={{padding:14}}>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr 1fr',gap:6,marginBottom:10}}>
              <div style={{textAlign:'center',padding:'8px 4px',background:'var(--bg3)',borderRadius:'var(--radius)'}}>
                <div style={{fontSize:18,fontWeight:700}}>{rows.length}</div>
                <div style={{fontSize:9,color:'var(--text2)'}}>إجمالي</div>
              </div>
              <div style={{textAlign:'center',padding:'8px 4px',background:'#f0fdf4',borderRadius:'var(--radius)'}}>
                <div style={{fontSize:18,fontWeight:700,color:'#16a34a'}}>{done}</div>
                <div style={{fontSize:9,color:'var(--text2)'}}>مكتمل</div>
              </div>
              <div style={{textAlign:'center',padding:'8px 4px',background:'#fef9c3',borderRadius:'var(--radius)'}}>
                <div style={{fontSize:18,fontWeight:700,color:'#854d0e'}}>{pending}</div>
                <div style={{fontSize:9,color:'var(--text2)'}}>معلق</div>
              </div>
              <div style={{textAlign:'center',padding:'8px 4px',background:'#dbeafe',borderRadius:'var(--radius)'}}>
                <div style={{fontSize:18,fontWeight:700,color:'#1e40af'}}>{tgDone}</div>
                <div style={{fontSize:9,color:'var(--text2)'}}>تيليجرام</div>
              </div>
            </div>
            
            <div style={{background:'var(--border)',borderRadius:3,height:6,overflow:'hidden',marginBottom:10}}>
              <div style={{height:'100%',borderRadius:3,background:'var(--blue)',width:pct+'%'}}/>
            </div>
            
            <div style={{fontSize:10,fontWeight:700,color:'var(--text2)',marginBottom:6}}>الشركات الشغالة على الـ Scope:</div>
            <div style={{display:'flex',gap:5,flexWrap:'wrap',marginBottom:10}}>
              {scopeComps.map(function(c){
                var comp=companies.find(function(x){return x.id===c;});
                var compRows=rows.filter(function(r){return r.company===c;});
                var compDone=compRows.filter(function(r){return r.status==='Done';}).length;
                return <div key={c} style={{display:'flex',alignItems:'center',gap:5,padding:'3px 9px',borderRadius:6,background:'var(--bg3)',border:'1px solid var(--border)',fontSize:10}}>
                  <span style={{width:8,height:8,borderRadius:'50%',background:comp?comp.color:'#64748b'}}/>
                  <span style={{fontWeight:600}}>{c}</span>
                  <span style={{color:'var(--text3)'}}>({compDone}/{compRows.length})</span>
                </div>;
              })}
            </div>
            
            <div style={{maxHeight:200,overflowY:'auto',border:'1px solid var(--border)',borderRadius:'var(--radius)'}}>
              <table style={{width:'100%',fontSize:10,borderCollapse:'collapse'}}>
                <thead><tr>
                  <th style={{padding:'5px 7px',background:'var(--bg3)',width:32,borderBottom:'1px solid var(--border)'}}></th>
                  <th style={{padding:'5px 7px',background:'var(--bg3)',textAlign:'right',borderBottom:'1px solid var(--border)',fontSize:9}}>Link ID</th>
                  <th style={{padding:'5px 7px',background:'var(--bg3)',textAlign:'right',borderBottom:'1px solid var(--border)',fontSize:9}}>Link Config</th>
                  <th style={{padding:'5px 7px',background:'var(--bg3)',textAlign:'right',borderBottom:'1px solid var(--border)',fontSize:9}}>الشركة</th>
                  <th style={{padding:'5px 7px',background:'var(--bg3)',textAlign:'right',borderBottom:'1px solid var(--border)',fontSize:9}}>الحالة</th>
                </tr></thead>
                <tbody>
                  {rows.map(function(r){return <tr key={r.id}>
                    <td style={{padding:'4px 6px',borderBottom:'1px solid var(--border)'}}><button onClick={function(){onView(r);}} style={{background:'#dbeafe',border:'1px solid #bfdbfe',borderRadius:5,padding:'2px 6px',cursor:'pointer',fontSize:10,color:'#1e40af'}} title="عرض">👁️</button></td>
                    <td style={{padding:'5px 7px',borderBottom:'1px solid var(--border)',direction:'ltr',color:'#005AFF',fontWeight:600,fontSize:10}}>{r.linkId}</td>
                    <td style={{padding:'5px 7px',borderBottom:'1px solid var(--border)',fontSize:10}}>{r.linkConfig||'—'}</td>
                    <td style={{padding:'5px 7px',borderBottom:'1px solid var(--border)'}}>{r.company}</td>
                    <td style={{padding:'5px 7px',borderBottom:'1px solid var(--border)'}}><Badge s={r.status}/></td>
                  </tr>;})}
                </tbody>
              </table>
            </div>
          </div>
        </div>;
      })}
    </div>
    {filtered.length===0&&<div style={{textAlign:'center',padding:'3rem',color:'var(--text3)'}}>لا توجد نتائج بالفلاتر دي</div>}

    {viewRow&&<div className="modal-bg" onClick={function(e){if(e.target===e.currentTarget)setViewRow(null);}}>
      <div className="modal" style={{width:600}}>
        <h3>👁️ تفاصيل اللينك: <span style={{color:'#005AFF',direction:'ltr',display:'inline-block'}}>{viewRow.linkId}</span></h3>
        <div style={{fontSize:11,fontWeight:700,color:'var(--text2)',marginBottom:8,paddingBottom:6,borderBottom:'1px solid var(--border)'}}>📋 البيانات الأساسية</div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginBottom:14}}>
          <div style={{padding:'8px 10px',background:'var(--bg3)',borderRadius:'var(--radius)'}}><div style={{fontSize:9,color:'var(--text3)'}}>Scope</div><div style={{fontWeight:600}}>{viewRow.scope||'—'}</div></div>
          <div style={{padding:'8px 10px',background:'var(--bg3)',borderRadius:'var(--radius)'}}><div style={{fontSize:9,color:'var(--text3)'}}>Link ID</div><div style={{fontWeight:600,direction:'ltr',color:'#005AFF'}}>{viewRow.linkId}</div></div>
          <div style={{padding:'8px 10px',background:'var(--bg3)',borderRadius:'var(--radius)'}}><div style={{fontSize:9,color:'var(--text3)'}}>Link Configuration</div><div style={{fontWeight:600}}>{viewRow.linkConfig||'—'}</div></div>
          <div style={{padding:'8px 10px',background:'var(--bg3)',borderRadius:'var(--radius)'}}><div style={{fontSize:9,color:'var(--text3)'}}>NR Site</div><div style={{fontWeight:600,direction:'ltr'}}>{viewRow.siteId}</div></div>
          <div style={{padding:'8px 10px',background:'var(--bg3)',borderRadius:'var(--radius)'}}><div style={{fontSize:9,color:'var(--text3)'}}>FE Site</div><div style={{fontWeight:600,direction:'ltr'}}>{viewRow.feSite}</div></div>
          <div style={{padding:'8px 10px',background:'var(--bg3)',borderRadius:'var(--radius)'}}><div style={{fontSize:9,color:'var(--text3)'}}>الشركة</div><div style={{fontWeight:600}}>{viewRow.company}</div></div>
          <div style={{padding:'8px 10px',background:'var(--bg3)',borderRadius:'var(--radius)'}}><div style={{fontSize:9,color:'var(--text3)'}}>المنطقة</div><div style={{fontWeight:600}}>{viewRow.area}</div></div>
          <div style={{padding:'8px 10px',background:'var(--bg3)',borderRadius:'var(--radius)'}}><div style={{fontSize:9,color:'var(--text3)'}}>الحالة</div><div><Badge s={viewRow.status}/></div></div>
          <div style={{padding:'8px 10px',background:'var(--bg3)',borderRadius:'var(--radius)'}}><div style={{fontSize:9,color:'var(--text3)'}}>Migration</div><div><Badge s={viewRow.migration||'—'}/></div></div>
          <div style={{padding:'8px 10px',background:'var(--bg3)',borderRadius:'var(--radius)'}}><div style={{fontSize:9,color:'var(--text3)'}}>تيليجرام</div><div style={{fontWeight:600}}>{viewRow.tg==='yes'?'✓ تم الإرسال':'✗ لم يرسل'}</div></div>
        </div>
        {viewRow.note&&<div style={{padding:'10px 12px',background:'#fffbeb',border:'1px solid #fde68a',borderRadius:'var(--radius)',marginBottom:12}}><div style={{fontSize:10,color:'#92400e',marginBottom:3}}>📝 ملاحظات</div><div style={{fontSize:12}}>{viewRow.note}</div></div>}
        
        <div style={{fontSize:11,fontWeight:700,color:'var(--text2)',margin:'14px 0 8px',paddingBottom:6,borderBottom:'1px solid var(--border)'}}>📷 الصور المرفوعة</div>
        <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:6,marginBottom:14}}>
          {[['before','قبل'],['after','بعد'],['serial','سريال'],['general','عامة']].map(function(arr){
            var k=arr[0],l=arr[1];
            var c=(viewRow.photos||{})[k]||0;
            return <div key={k} style={{textAlign:'center',padding:'8px 4px',background:c>0?'#f0fdf4':'var(--bg3)',border:'1px solid '+(c>0?'#bbf7d0':'var(--border)'),borderRadius:'var(--radius)'}}>
              <div style={{fontSize:18,fontWeight:700,color:c>0?'#16a34a':'var(--text3)'}}>{c}</div>
              <div style={{fontSize:9,color:'var(--text2)'}}>{l}</div>
            </div>;
          })}
        </div>

        <div style={{fontSize:11,fontWeight:700,color:'var(--text2)',margin:'14px 0 8px',paddingBottom:6,borderBottom:'1px solid var(--border)'}}>📅 سجل التواريخ</div>
        <div style={{display:'flex',flexDirection:'column',gap:5,marginBottom:12}}>
          <div style={{display:'flex',alignItems:'center',gap:8,padding:'7px 12px',background:'#eff6ff',border:'1px solid #bfdbfe',borderRadius:'var(--radius)',fontSize:11}}>
            <span>➕</span><span style={{fontWeight:700,color:'#1e40af'}}>تاريخ الإضافة</span>
            <span style={{marginRight:'auto',color:'#1e40af',fontFamily:'monospace'}}>{viewRow.dateAdded||'—'}</span>
          </div>
          {(viewRow.completions||[]).map(function(c,i){return <div key={i} style={{display:'flex',alignItems:'center',gap:8,padding:'7px 12px',background:'#f0fdf4',border:'1px solid #bbf7d0',borderRadius:'var(--radius)',fontSize:11}}>
            <span>📷</span><span style={{fontWeight:700,color:'#166534'}}>استكمال {i+1}</span>
            <span style={{fontSize:10,color:'var(--text3)'}}>بواسطة: {c.by}</span>
            <span style={{marginRight:'auto',color:'#166534',fontFamily:'monospace'}}>{c.date}</span>
          </div>;})}
          {(viewRow.editLog||[]).map(function(e,i){return <div key={i} style={{padding:'7px 12px',background:'#fffbeb',border:'1px solid #fde68a',borderRadius:'var(--radius)',fontSize:11}}>

function ActivityLogPage({activityLog,setActivityLog,users,activityFetchUrl,showToast}){
  var [loading,setLoading]=useState(false);
  
  function fetchFromSheet(){
    if(!activityFetchUrl){
      showToast('أضف رابط الـ Webhook في الإعدادات أولاً','err');
      return;
    }
    setLoading(true);
    fetch(activityFetchUrl).then(function(r){return r.json();}).then(function(rows){
      if(!Array.isArray(rows)){
        showToast('البيانات غير صحيحة','err');
        setLoading(false);
        return;
      }
      var entries=rows.map(function(r,i){
        return {
          id:'sheet_'+i+'_'+Date.now(),
          time:(r.date||'')+(r.time?' '+r.time:''),
          user:r.user||'-',
          userId:r.userId||0,
          role:r.role||'-',
          action:r.action||'-',
          details:r.details||''
        };
      });
      setActivityLog(entries);
      showToast('✓ تم تحميل '+entries.length+' نشاط من Google Sheet');
      setLoading(false);
    }).catch(function(e){
      showToast('فشل التحميل: '+e.message,'err');
      setLoading(false);
    });
  }
  
  var [filterUser,setFilterUser]=useState('all');
  var [filterAction,setFilterAction]=useState('all');
  var [search,setSearch]=useState('');
  
  var actions=[...new Set(activityLog.map(function(l){return l.action;}))];
  var filtered=activityLog;
  if(filterUser!=='all') filtered=filtered.filter(function(l){return l.userId===parseInt(filterUser);});
  if(filterAction!=='all') filtered=filtered.filter(function(l){return l.action===filterAction;});
  if(search) filtered=filtered.filter(function(l){var s=search.toLowerCase();return (l.details||'').toLowerCase().includes(s)||l.user.toLowerCase().includes(s);});
  
  return <>
    <div className="ph">
      <div className="phl"><h1>📋 سجل النشاطات</h1><p>{filtered.length} نشاط — تتبع كل شيء يحدث في النظام</p></div>
      <button className="btn btn-blue" onClick={fetchFromSheet} disabled={loading}>
        {loading?'⏳ جاري التحميل...':'🔄 تحديث من Google Sheet'}
      </button>
    </div>
    
    <div style={{display:'flex',gap:10,marginBottom:14,flexWrap:'wrap',padding:'10px 14px',background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:'var(--radius-lg)'}}>
      <div style={{display:'flex',flexDirection:'column',gap:3,minWidth:160}}>
        <label style={{fontSize:10,fontWeight:600,color:'var(--text2)'}}>المستخدم</label>
        <select value={filterUser} onChange={function(e){setFilterUser(e.target.value);}} style={{padding:'7px 10px',border:'1px solid var(--border)',borderRadius:'var(--radius)',background:'var(--bg)',fontSize:11,fontFamily:'inherit'}}>
          <option value="all">كل المستخدمين</option>
          {users.map(function(u){return <option key={u.id} value={u.id}>{u.name}</option>;})}
        </select>
      </div>
      <div style={{display:'flex',flexDirection:'column',gap:3,minWidth:160}}>
        <label style={{fontSize:10,fontWeight:600,color:'var(--text2)'}}>نوع النشاط</label>
        <select value={filterAction} onChange={function(e){setFilterAction(e.target.value);}} style={{padding:'7px 10px',border:'1px solid var(--border)',borderRadius:'var(--radius)',background:'var(--bg)',fontSize:11,fontFamily:'inherit'}}>
          <option value="all">كل الأنشطة</option>
          {actions.map(function(a){return <option key={a}>{a}</option>;})}
        </select>
      </div>
      <div style={{display:'flex',flexDirection:'column',gap:3,minWidth:200,flex:1}}>
        <label style={{fontSize:10,fontWeight:600,color:'var(--text2)'}}>بحث</label>
        <input value={search} onChange={function(e){setSearch(e.target.value);}} placeholder="ابحث في التفاصيل..." style={{padding:'7px 10px',border:'1px solid var(--border)',borderRadius:'var(--radius)',background:'var(--bg)',fontSize:11,fontFamily:'inherit'}}/>
      </div>
      {(filterUser!=='all'||filterAction!=='all'||search)&&<button onClick={function(){setFilterUser('all');setFilterAction('all');setSearch('');}} style={{alignSelf:'flex-end',padding:'7px 14px',background:'#fee2e2',color:'#991b1b',border:'1px solid #fca5a5',borderRadius:'var(--radius)',cursor:'pointer',fontSize:11,fontWeight:600}}>✕ مسح</button>}
    </div>

    <div style={{background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:'var(--radius-lg)',overflow:'hidden'}}>
      {filtered.length===0?<div style={{padding:'3rem',textAlign:'center',color:'var(--text3)'}}>لا توجد نشاطات بالفلاتر دي</div>:
      <div style={{maxHeight:'70vh',overflowY:'auto'}}>
        {filtered.map(function(log){
          var u=users.find(function(x){return x.id===log.userId;});
          var actionColors={'إضافة لينك':'#16a34a','تعديل لينك':'#d97706','حذف لينك':'#dc2626','نقل لينك':'#7c3aed','تعيين مهندسين':'#0891b2','رفع صور':'#16a34a','تسجيل دخول':'#3b82f6','تسجيل خروج':'#64748b'};
          var color=actionColors[log.action]||'#64748b';
          return <div key={log.id} style={{padding:'10px 14px',borderBottom:'1px solid var(--border)',display:'flex',alignItems:'center',gap:10}}>
            <div style={{width:32,height:32,borderRadius:'50%',background:u?u.color:'#64748b',display:'flex',alignItems:'center',justifyContent:'center',color:'#fff',fontSize:11,fontWeight:700,flexShrink:0}}>{initials(log.user)}</div>
            <div style={{flex:1,minWidth:0}}>
              <div style={{display:'flex',alignItems:'center',gap:6,flexWrap:'wrap'}}>
                <span style={{fontWeight:700,fontSize:12}}>{log.user}</span>
                <span style={{fontSize:9,color:'var(--text3)'}}>({log.role})</span>
                <span style={{padding:'2px 8px',background:color+'20',color:color,borderRadius:6,fontSize:10,fontWeight:600}}>{log.action}</span>
              </div>
              {log.details&&<div style={{fontSize:11,color:'var(--text2)',marginTop:3}}>{log.details}</div>}
            </div>
            <div style={{fontSize:10,color:'var(--text3)',fontFamily:'monospace',whiteSpace:'nowrap',flexShrink:0,direction:'ltr'}}>{log.time}</div>
          </div>;
        })}
      </div>}
    </div>
  </>;
}

function UsersPage({users,setUsers,companies,showToast,logActivity}){
  const [showModal,setShowModal]=useState(false);
  const [editUser,setEditUser]=useState(null);
  const [uf,setUf]=useState({name:'',username:'',password:'',role:'شريك',company:'',perms:{view:true,add:true,edit:false,ownEdit:false,delete:false,manageUsers:false,settings:false},companies:[]});
  const UF=(k,v)=>setUf(f=>({...f,[k]:v}));
  const UFP=(k)=>setUf(f=>({...f,perms:{...f.perms,[k]:!f.perms[k]}}));
  const UFComp=(c)=>setUf(f=>({...f,companies:f.companies.includes(c)?f.companies.filter(x=>x!==c):[...f.companies,c]}));
  const allCompIds=companies.map(c=>c.id);
  function openAdd(){setEditUser(null);setUf({name:'',username:'',password:'',role:'شريك',company:'',perms:{view:true,add:true,edit:false,ownEdit:false,delete:false,manageUsers:false,settings:false},companies:[]});setShowModal(true);}
  function openEdit(u){setEditUser(u);setUf({name:u.name,username:u.username,password:u.password,role:u.role,company:u.company,perms:{...u.perms},companies:u.companies?[...u.companies]:[]});setShowModal(true);}
  function submit(){
    if(!uf.name||!uf.username||!uf.password){showToast('أكمل البيانات المطلوبة','err');return;}
    const companiesVal=uf.companies.length===allCompIds.length?null:uf.companies;
    if(editUser){setUsers(us=>us.map(u=>u.id===editUser.id?{...u,...uf,companies:companiesVal,color:u.color}:u));}
    else{setUsers(us=>[...us,{id:Date.now(),...uf,companies:companiesVal,color:AVATAR_COLORS[us.length%AVATAR_COLORS.length]}]);}
    showToast(editUser?'✓ تم تعديل '+uf.name:'✓ تم إضافة '+uf.name);
    if(logActivity){
      if(editUser) logActivity('تعديل مستخدم','عدل المستخدم: '+uf.name+' ('+uf.role+')');
      else logActivity('إضافة مستخدم','أضاف مستخدم جديد: '+uf.name+' ('+uf.role+')');
    }
    setShowModal(false);
  }
  function permChips(u){
    const p=[];
    if(u.perms.manageUsers) p.push({t:'Admin',c:'pc-admin'});
    else if(u.perms.edit) p.push({t:'تعديل الكل',c:'pc-edit'});
    if(u.perms.ownEdit) p.push({t:'🔧 مهندس موقع',c:'pc-edit'});
    if(u.perms.add) p.push({t:'إضافة',c:'pc-add'});
    if(u.perms.view&&!u.perms.edit&&!u.perms.add) p.push({t:'عرض فقط',c:'pc-view'});
    if(u.companies&&u.companies.length<allCompIds.length) p.push({t:u.companies.join(', '),c:'pc-comp'});
    return p;
  }
  return(<>
    <div className="page-header">
      <div className="page-header-left"><h1>إدارة المستخدمين</h1><p>{users.length} مستخدم</p></div>
      <button className="btn btn-blue" onClick={openAdd}>+ إضافة مستخدم</button>
    </div>
    {users.map(u=><div className="user-card" key={u.id}>
      <div className="user-av2" style={{background:u.color}}>{initials(u.name)}</div>
      <div className="user-info">
        <div className="user-name">{u.name}</div>
        <div className="user-meta">{u.role} — {u.company} — <span style={{fontFamily:'monospace',color:'#005AFF'}}>{u.username}</span></div>
        <div className="user-perms">{permChips(u).map((p,i)=><span key={i} className={'perm-chip '+p.c}>{p.t}</span>)}</div>
      </div>
      {u.id!==1&&<div style={{display:'flex',gap:6}}>
        <button className="btn btn-sm" onClick={()=>openEdit(u)}>تعديل</button>
        <button className="btn btn-red btn-sm" onClick={()=>{setUsers(us=>us.filter(x=>x.id!==u.id));showToast('تم حذف '+u.name);if(logActivity)logActivity('حذف مستخدم','حذف المستخدم: '+u.name+' ('+u.role+')');}}>حذف</button>
      </div>}
      {u.id===1&&<span style={{fontSize:10,color:'#94a3b8',padding:'4px 10px',background:'#f1f5f9',borderRadius:6}}>أنت</span>}
    </div>)}
    {showModal&&<div className="modal-bg" onClick={e=>e.target===e.currentTarget&&setShowModal(false)}>
      <div className="modal">
        <h3>{editUser?'تعديل: '+editUser.name:'إضافة مستخدم جديد'}</h3>
        <div className="fg2">
          <div className="fg"><label>الاسم *</label><input placeholder="Ahmed Mohamed" value={uf.name} onChange={e=>UF('name',e.target.value)}/></div>
          <div className="fg"><label>الوظيفة</label><input placeholder="مشرف / شريك" value={uf.role} onChange={e=>UF('role',e.target.value)}/></div>
          <div className="fg"><label>اسم المستخدم *</label><input placeholder="ahmed123" value={uf.username} onChange={e=>UF('username',e.target.value)} style={{direction:'ltr'}}/></div>
          <div className="fg"><label>كلمة السر *</label><input placeholder="••••••••" value={uf.password} onChange={e=>UF('password',e.target.value)} style={{direction:'ltr'}}/></div>
          <div className="fg"><label>الشركة</label><input placeholder="Nokia / NJV / AMC" value={uf.company} onChange={e=>UF('company',e.target.value)}/></div>
        </div>
        <div className="perm-section" style={{marginTop:10}}>
          <div className="perm-section-header">الـ Role (قالب جاهز)</div>
          <div className="perm-options">
            {[
              ['admin','Admin 👑','كل الصلاحيات',{view:true,add:true,edit:true,ownEdit:false,delete:true,manageUsers:true,settings:true}],
              ['ti_admin','TI Admin 🛡️','عرض / إضافة / تعديل / إدارة مستخدمين / إعدادات',{view:true,add:true,edit:true,ownEdit:false,delete:false,manageUsers:true,settings:true}],
              ['ti','TI 📊','عرض / إضافة / تعديل / إدارة مستخدمين',{view:true,add:true,edit:true,ownEdit:false,delete:false,manageUsers:true,settings:false}],
              ['coordinator','Coordinator 📋','عرض / إضافة / تعديل',{view:true,add:true,edit:true,ownEdit:false,delete:false,manageUsers:false,settings:false}],
              ['site_eng','Site Engineer 🔧','مهندس موقع — يعدل لينكاته فقط',{view:true,add:true,edit:false,ownEdit:true,delete:false,manageUsers:false,settings:false}]
            ].map(function(arr){
              var k=arr[0],l=arr[1],d=arr[2],p=arr[3];
              var isMatch=Object.keys(p).every(function(key){return uf.perms[key]===p[key];});
              return <label key={k} className="perm-opt" style={isMatch?{background:'#eff6ff',borderColor:'#3b82f6'}:{}}>
                <input type="radio" name="roleTemplate" checked={isMatch} onChange={function(){UF('perms',p);}}/>
                <div><div className="perm-opt-label">{l}</div><div className="perm-opt-desc">{d}</div></div>
              </label>;
            })}
          </div>
        </div>

        <div className="perm-section">
          <div className="perm-section-header">صلاحيات إضافية</div>
          <div className="perm-options">
            {[['view','عرض البيانات','يشوف البيانات والتقارير'],['add','إضافة بيانات','يضيف لينكات ويرفع صور'],['edit','تعديل البيانات','يعدل على أي بيانات موجودة'],['ownEdit','مهندس الموقع 🔧','يعدل فقط على اللينكات اللي أضافها هو'],['delete','حذف بيانات','يحذف لينكات'],['manageUsers','إدارة المستخدمين','يضيف ويعدل مستخدمين'],['settings','الإعدادات','يدخل إعدادات النظام']].map(function(arr){
              var k=arr[0],l=arr[1],d=arr[2];
              return <label key={k} className="perm-opt">
                <input type="checkbox" checked={uf.perms[k]} onChange={function(){UFP(k);}}/>
                <div><div className="perm-opt-label">{l}</div><div className="perm-opt-desc">{d}</div></div>
              </label>;
            })}
          </div>
        </div>
        <div className="perm-section">
          <div className="perm-section-header">الشركات اللي يشوفها</div>
          <div className="perm-options">
            <label className="perm-opt">
              <input type="checkbox" checked={uf.companies.length===allCompIds.length} onChange={()=>UF('companies',uf.companies.length===allCompIds.length?[]:allCompIds)}/>
              <div className="perm-opt-label">كل الشركات</div>
            </label>
            <div className="divider-line"/>
            <div className="comp-cbs">
              {companies.map(c=><label key={c.id} className="comp-cb">
                <input type="checkbox" checked={uf.companies.includes(c.id)} onChange={()=>UFComp(c.id)}/><span>{c.name}</span>
              </label>)}
            </div>
          </div>
        </div>
        <div className="modal-footer">
          <button className="btn" onClick={()=>setShowModal(false)}>إلغاء</button>
          <button className="btn btn-blue" onClick={submit}>{editUser?'حفظ التعديلات':'إضافة المستخدم'}</button>
        </div>
      </div>
    </div>}
  </>);
}
