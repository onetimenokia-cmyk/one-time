function TgCompMembers({company,members,setTgMembers}){
  const [newUsername,setNewUsername]=useState('');
  const [newRole,setNewRole]=useState('member');
  function addMember(){
    if(!newUsername.trim()) return;
    const m={username:newUsername.trim().replace('@',''),role:newRole};
    setTgMembers(t=>({...t,[company.id]:[...(t[company.id]||[]),m]}));
    setNewUsername('');setNewRole('member');
  }
  function removeMember(idx){setTgMembers(t=>({...t,[company.id]:(t[company.id]||[]).filter((_,i)=>i!==idx)}));}
  function toggleRole(idx){setTgMembers(t=>({...t,[company.id]:(t[company.id]||[]).map((m,i)=>i===idx?{...m,role:m.role==='admin'?'member':'admin'}:m)}));}
  return(
    <div style={{marginBottom:16,padding:12,border:'1px solid var(--border)',borderRadius:8,background:'var(--bg2)'}}>
      <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:10}}>
        <div style={{width:12,height:12,borderRadius:3,background:company.color}}/>
        <strong style={{fontSize:12}}>{company.name}</strong>
        <span style={{fontSize:10,color:'var(--text3)'}}>({members.length} عضو)</span>
      </div>
      {members.length>0&&(
        <div style={{marginBottom:10}}>
          {members.map((m,i)=>(
            <div key={i} style={{display:'flex',alignItems:'center',gap:8,marginBottom:6,padding:'6px 10px',background:'var(--bg)',borderRadius:6,border:'1px solid var(--border)'}}>
              <span style={{fontSize:11,flex:1,direction:'ltr',textAlign:'left'}}>@{m.username}</span>
              <button onClick={()=>toggleRole(i)} style={{padding:'2px 8px',borderRadius:4,border:'none',cursor:'pointer',fontSize:10,background:m.role==='admin'?'#fef3c7':'#f1f5f9',color:m.role==='admin'?'#d97706':'#64748b',fontWeight:600}}>
                {m.role==='admin'?'👑 Admin':'👤 Member'}
              </button>
              <button onClick={()=>removeMember(i)} style={{padding:'2px 8px',borderRadius:4,border:'none',cursor:'pointer',fontSize:10,background:'#fee2e2',color:'#dc2626'}}>✕</button>
            </div>
          ))}
        </div>
      )}
      <div style={{display:'flex',gap:6}}>
        <input placeholder="username بدون @" value={newUsername} onChange={e=>setNewUsername(e.target.value)} onKeyDown={e=>e.key==='Enter'&&addMember()} style={{flex:1,padding:'6px 10px',border:'1px solid var(--border)',borderRadius:6,background:'var(--bg)',color:'var(--text)',fontSize:11,fontFamily:'inherit'}}/>
        <select value={newRole} onChange={e=>setNewRole(e.target.value)} style={{padding:'6px 8px',border:'1px solid var(--border)',borderRadius:6,background:'var(--bg)',color:'var(--text)',fontSize:11,fontFamily:'inherit'}}>
          <option value="member">👤 Member</option>
          <option value="admin">👑 Admin</option>
        </select>
        <button onClick={addMember} className="btn btn-blue" style={{padding:'6px 12px',fontSize:11}}>+ إضافة</button>
      </div>
    </div>
  );
}

function SettingsPage({companies,setCompanies,areas,setAreas,scopes,setScopes,data,showToast,logActivity,webhookUrl,setWebhookUrl,tgIds,setTgIds,tgMembers,setTgMembers,sheetId,setSheetId,activityWebhookUrl,setActivityWebhookUrl,activityFetchUrl,setActivityFetchUrl}){
  const [connSt,setConnSt]=useState('idle');
  const [sendLog,setSendLog]=useState([]);
  const [showCompModal,setShowCompModal]=useState(false);
  const [editComp,setEditComp]=useState(null);
  const [compForm,setCompForm]=useState({name:'',color:'#005AFF'});

  async function testConn(){
    if(!webhookUrl){setConnSt('fail');return;}
    setConnSt('testing');
    try{
      // /health endpoint بيشيك إن السيرفر شغال + Pyrogram متصل (ومش بيعمل جروب فاضي)
      var healthUrl=webhookUrl.replace(/\/webhook\/?$/,'/health');
      var res=await fetch(healthUrl,{method:'GET'});
      if(!res.ok) throw new Error('HTTP '+res.status);
      var json=await res.json();
      if(!json.pyrogram){setConnSt('fail');setSendLog(l=>[{time:tsNow(),ok:false,msg:'السيرفر شغال بس Pyrogram مش متصل'},...l].slice(0,30));return;}
      setConnSt('ok');
      setSendLog(l=>[{time:tsNow(),ok:true,msg:'الاتصال ناجح + Pyrogram متصل ✓'},...l].slice(0,30));
    }catch(e){
      console.error('testConn error:',e);
      setConnSt('fail');
      setSendLog(l=>[{time:tsNow(),ok:false,msg:'فشل الاتصال: '+e.message},...l].slice(0,30));
    }
  }

  function openAddComp(){setEditComp(null);setCompForm({name:'',color:COMP_COLORS[companies.length%COMP_COLORS.length]});setShowCompModal(true);}
  function openEditComp(c){setEditComp(c);setCompForm({name:c.name,color:c.color});setShowCompModal(true);}

  function submitComp(){
    if(!compForm.name.trim()){showToast('أدخل اسم الشركة','err');return;}
    if(editComp){
      setCompanies(cs=>cs.map(c=>c.id===editComp.id?{...c,...compForm,name:compForm.name.trim()}:c));
      showToast('✓ تم تعديل شركة '+compForm.name);
    } else {
      const id=compForm.name.trim().replace(/\s+/g,'-');
      if(companies.find(c=>c.id===id)){showToast('الشركة موجودة بالفعل','err');return;}
      setCompanies(cs=>[...cs,{id,name:compForm.name.trim(),color:compForm.color}]);
      showToast('✓ تم إضافة شركة '+compForm.name);
    }
    setShowCompModal(false);
  }

  function deleteComp(c){
    const hasLinks=data.some(r=>r.company===c.id);
    if(hasLinks){showToast('❌ مش ممكن تحذف '+c.name+' لأن فيها لينكات','err');return;}
    setCompanies(cs=>cs.filter(x=>x.id!==c.id));
    showToast('تم حذف شركة '+c.name);if(logActivity)logActivity('حذف شركة','حذف الشركة: '+c.name);
  }

  function hideComp(c){
    setCompanies(cs=>cs.map(x=>x.id===c.id?{...x,hidden:true}:x));
    showToast('تم إخفاء شركة '+c.name+' — البيانات محفوظة');
  }

  function showComp(c){
    setCompanies(cs=>cs.map(x=>x.id===c.id?{...x,hidden:false}:x));
    showToast('✓ تم إظهار شركة '+c.name+' في الداشبورد');
  }

  const compLinkCount=useMemo(()=>{const m={};data.forEach(r=>{m[r.company]=(m[r.company]||0)+1});return m;},[data]);

  return(<>
    <div className="page-header">
      <div className="page-header-left"><h1>الإعدادات</h1><p>إدارة الشركات والربط مع Make.com وتيليجرام</p></div>
    </div>

    {/* COMPANIES SECTION */}
    <div className="setup-card">
      <div className="setup-header">
        <div className="setup-num done">🏢</div>
        <span className="setup-title">إدارة الشركات الشريكة</span>
        <span style={{fontSize:10,color:'var(--text3)'}}>{companies.length} شركة</span>
      </div>
      <div className="setup-body">
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
          <div className="info-box" style={{flex:1,marginBottom:0,marginLeft:10}}>
            إضافة شركة جديدة هتظهر تلقائياً في <strong>الداشبورد</strong> و<strong>فورم الإضافة</strong> و<strong>صفحة المستخدمين</strong> و<strong>إعدادات تيليجرام</strong>
          </div>
          <button className="btn btn-blue" style={{flexShrink:0}} onClick={openAddComp}>+ إضافة شركة</button>
        </div>
        {/* الشركات النشطة */}
        <div className="comp-list-grid">
          {companies.filter(c=>!c.hidden).map(c=>{
            const count=compLinkCount[c.id]||0;
            return(
              <div className="comp-card" key={c.id}>
                <div className="comp-card-icon" style={{background:c.color}}>{c.name.substring(0,2).toUpperCase()}</div>
                <div className="comp-card-info">
                  <div className="comp-card-name">{c.name}</div>
                  <div className="comp-card-count">{count} لينك</div>
                </div>
                <div className="comp-card-actions">
                  <button className="btn btn-sm" onClick={()=>openEditComp(c)} title="تعديل">✏️</button>
                  <button className="btn btn-sm" onClick={()=>hideComp(c)} title="إخفاء من الداشبورد" style={{background:'#fef9c3',borderColor:'#fde047',color:'#854d0e'}}>🙈</button>
                  <button className="btn btn-red btn-sm" onClick={()=>deleteComp(c)} title={count>0?'لا يمكن الحذف — فيها لينكات':'حذف'} style={{opacity:count>0?.4:1}}>🗑️</button>
                </div>
              </div>
            );
          })}
        </div>

        {/* الشركات المخفية */}
        {companies.some(c=>c.hidden)&&<>
          <div style={{fontSize:11,fontWeight:700,color:'var(--text2)',margin:'16px 0 8px',paddingBottom:6,borderBottom:'1px solid var(--border)',display:'flex',alignItems:'center',gap:6}}>
            <span>🙈</span>
            <span>الشركات المخفية</span>
            <span style={{fontSize:10,fontWeight:400,color:'var(--text3)'}}>— البيانات محفوظة ومش ظاهرة في الداشبورد</span>
          </div>
          <div className="comp-list-grid">
            {companies.filter(c=>c.hidden).map(c=>{
              const count=compLinkCount[c.id]||0;
              return(
                <div className="comp-card" key={c.id} style={{opacity:.7,border:'1px dashed var(--border)'}}>
                  <div className="comp-card-icon" style={{background:'#94a3b8'}}>{c.name.substring(0,2).toUpperCase()}</div>
                  <div className="comp-card-info">
                    <div className="comp-card-name" style={{color:'var(--text3)'}}>{c.name}</div>
                    <div className="comp-card-count">{count} لينك محفوظة</div>
                  </div>
                  <div className="comp-card-actions">
                    <button className="btn btn-sm" onClick={()=>showComp(c)} title="إظهار في الداشبورد" style={{background:'#dcfce7',borderColor:'#bbf7d0',color:'#166534'}}>👁️ إظهار</button>
                    <button className="btn btn-red btn-sm" onClick={()=>deleteComp(c)} title={count>0?'لا يمكن الحذف':'حذف'} style={{opacity:count>0?.3:1}}>🗑️</button>
                  </div>
                </div>
              );
            })}
          </div>
        </>}
      </div>
    </div>

    {/* AREAS */}
    <div className="setup-card">
      <div className="setup-header">
        <div className="setup-num done">📍</div>
        <span className="setup-title">إدارة المناطق</span>
        <span style={{fontSize:10,color:'var(--text3)'}}>{areas.length} منطقة</span>
      </div>
      <div className="setup-body">
        <div style={{display:'flex',gap:8,flexWrap:'wrap',marginBottom:10}}>
          {areas.map((a,i)=><div key={a} style={{display:'flex',alignItems:'center',gap:6,padding:'6px 12px',background:'var(--bg3)',border:'1px solid var(--border)',borderRadius:'var(--radius)',fontSize:12}}>
            <span>{a}</span>
            <button onClick={()=>{
              const newName=prompt('تعديل اسم المنطقة:',a);
              if(newName&&newName.trim()&&newName.trim()!==a){
                setAreas(arr=>arr.map((x,j)=>j===i?newName.trim():x));
                showToast('✓ تم تعديل المنطقة');if(logActivity)logActivity('تعديل منطقة','عدل المنطقة');
              }
            }} style={{background:'none',border:'none',cursor:'pointer',fontSize:11,color:'var(--text3)',padding:'0 2px'}} title="تعديل">✏️</button>
            {areas.length>1&&<button onClick={()=>{
              if(window.confirm('هتحذف منطقة '+a+'؟')){
                setAreas(arr=>arr.filter((_,j)=>j!==i));
                showToast('تم حذف منطقة '+a);if(logActivity)logActivity('حذف منطقة','حذف المنطقة: '+a);
              }
            }} style={{background:'none',border:'none',cursor:'pointer',fontSize:11,color:'var(--red)',padding:'0 2px'}} title="حذف">×</button>}
          </div>)}
          <button className="btn btn-blue btn-sm" onClick={()=>{
            const newArea=prompt('اسم المنطقة الجديدة:');
            if(newArea&&newArea.trim()){
              if(areas.includes(newArea.trim())){showToast('المنطقة موجودة بالفعل','err');return;}
              setAreas(arr=>[...arr,newArea.trim()]);
              showToast('✓ تم إضافة منطقة '+newArea.trim());if(logActivity)logActivity('إضافة منطقة','أضاف منطقة جديدة: '+newArea.trim());
            }
          }}>+ إضافة منطقة</button>
        </div>
        <div className="info-box">المناطق دي بتظهر تلقائياً في <strong>فورم الإضافة</strong> و<strong>فورم التعديل</strong> و<strong>فلاتر الجدول</strong></div>
      </div>
    </div>

    {/* SCOPES */}
    <div className="setup-card">
      <div className="setup-header">
        <div className="setup-num" style={{background:'#7c3aed'}}>📋</div>
        <span className="setup-title">إدارة الـ Scopes</span>
      </div>
      <div className="setup-body">
        <div style={{display:'flex',flexDirection:'column',gap:6,marginBottom:10}}>
          {scopes.map(function(sc,i){
            var inUse=data.filter(function(r){return r.scope===sc.name;}).length;
            return <div key={sc.name} style={{display:'flex',alignItems:'center',gap:8,padding:'8px 12px',background:sc.hidden?'#fef2f2':'var(--bg3)',border:'1px solid '+(sc.hidden?'#fecaca':'var(--border)'),borderRadius:'var(--radius)',opacity:sc.hidden?0.6:1}}>
              <span style={{fontSize:12,fontWeight:600,flex:1}}>{sc.name}</span>
              <span style={{fontSize:10,color:'var(--text3)'}}>{inUse} لينك</span>
              <button onClick={function(){
                var n=prompt('تعديل اسم الـ Scope:',sc.name);
                if(n&&n.trim()&&n.trim()!==sc.name){
                  if(scopes.some(function(x){return x.name===n.trim();})){showToast('الـ Scope موجود','err');return;}
                  var oldName=sc.name;
                  setScopes(function(arr){return arr.map(function(x,j){return j===i?Object.assign({},x,{name:n.trim()}):x;});});
                  showToast('تم تعديل الـ Scope');if(logActivity)logActivity('تعديل Scope','عدل Scope: '+oldName+' ← '+n.trim());
                }
              }} style={{background:'none',border:'none',cursor:'pointer',fontSize:11,padding:'2px 4px'}} title="تعديل">✏️</button>
              <button onClick={function(){
                setScopes(function(arr){return arr.map(function(x,j){return j===i?Object.assign({},x,{hidden:!x.hidden}):x;});});
                showToast(sc.hidden?'تم إظهار الـ Scope':'تم إخفاء الـ Scope');if(logActivity)logActivity(sc.hidden?'إظهار Scope':'إخفاء Scope',(sc.hidden?'أظهر':'أخفى')+' Scope: '+sc.name);
              }} style={{background:'none',border:'none',cursor:'pointer',fontSize:11,padding:'2px 4px'}} title={sc.hidden?'إظهار':'إخفاء'}>{sc.hidden?'👁️':'🙈'}</button>
              {inUse===0?<button onClick={function(){
                if(window.confirm('حذف Scope "'+sc.name+'"؟')){
                  setScopes(function(arr){return arr.filter(function(_,j){return j!==i;});});
                  showToast('تم حذف الـ Scope');if(logActivity)logActivity('حذف Scope','حذف Scope: '+sc.name);
                }
              }} style={{background:'none',border:'1px solid var(--border)',cursor:'pointer',fontSize:11,padding:'2px 8px',color:'var(--red)',borderRadius:5}} title="حذف">🗑️</button>:<span style={{fontSize:9,color:'var(--text3)',padding:'2px 8px',background:'var(--bg)',border:'1px solid var(--border)',borderRadius:5}} title="مش هتقدر تحذف لأن في لينكات بتستخدمه">🔒</span>}
            </div>;
          })}
        </div>
        <button className="btn btn-blue btn-sm" onClick={function(){
          var n=prompt('اسم الـ Scope الجديد:');
          if(n&&n.trim()){
            if(scopes.some(function(x){return x.name===n.trim();})){showToast('الـ Scope موجود','err');return;}
            setScopes(function(arr){return arr.concat([{name:n.trim(),hidden:false}]);});
            showToast('تم إضافة Scope: '+n.trim());if(logActivity)logActivity('إضافة Scope','أضاف Scope جديد: '+n.trim());
          }
        }}>+ إضافة Scope</button>
        <div className="info-box">الـ Scopes دي بتظهر تلقائياً في <strong>فورم الإضافة</strong>. لو فيه لينكات على Scope مش هتقدر تحذفه — اعمله إخفاء بدل ما تمسحه.</div>
      </div>
    </div>

    {/* WEBHOOK */}
    <div className="setup-card">
      <div className="setup-header">
        <div className={'setup-num '+(webhookUrl?'done':'')}>{ webhookUrl?'✓':'1'}</div>
        <span className="setup-title">Make.com Webhook</span>
        <span style={{fontSize:10,color:webhookUrl?'#22c55e':'#94a3b8'}}>{webhookUrl?'متصل':'لم يضبط'}</span>
      </div>
      <div className="setup-body">
        <div className="make-steps">
          {[['Webhooks → Custom Webhook','استقبال البيانات والصور'],['Google Drive → Upload a File','رفع الصور مؤقتاً'],['Telegram Bot → Send a Photo','إرسال الصور لجروب اللينك'],['Google Drive → Delete a File','مسح الصور من Drive تلقائياً'],['Google Sheets → Add a Row','حفظ البيانات في الشيت']].map(([t,d],i)=>
            <div className="make-step" key={i}><div className="ms-num">{i+1}</div><div className="ms-body"><strong>{t}</strong><br/>{d}</div></div>
          )}
        </div>
        <div className="field-row" style={{marginTop:14}}>
          <input placeholder="https://hook.eu1.make.com/xxxxxxxxxxxxxxxx" value={webhookUrl} onChange={e=>setWebhookUrl(e.target.value)} className={webhookUrl?'ok':''}/>
          <button className="btn btn-blue" onClick={testConn} style={{whiteSpace:'nowrap'}}>{connSt==='testing'?'...':'اختبار'}</button>
        </div>
        {connSt!=='idle'&&<div className={'conn-status '+(connSt==='ok'?'conn-ok':'conn-fail')}>
          <div className="dot"/>{connSt==='ok'?'الاتصال ناجح!':connSt==='fail'?'فشل — تحقق من الـ URL':'جاري...'}
        </div>}
      </div>
    </div>

    {/* ACTIVITY LOG WEBHOOK */}
    <div className="setup-card">
      <div className="setup-header">
        <div className={'setup-num '+(activityWebhookUrl?'done':'')} style={{background:activityWebhookUrl?'var(--green)':'#9333ea'}}>{activityWebhookUrl?'✓':'📋'}</div>
        <span className="setup-title">Webhook لسجل النشاطات</span>
      </div>
      <div className="setup-body">
        <div style={{fontSize:11,color:'var(--text2)',marginBottom:8,lineHeight:1.7}}>
          هذا الـ Webhook لإرسال <strong>سجل النشاطات</strong> لـ Google Sheet عبر Make.com تلقائياً (مختلف عن webhook اللينكات).
        </div>
        <div className="field-row">
          <input type="url" placeholder="https://hook.eu1.make.com/..." value={activityWebhookUrl} onChange={function(e){setActivityWebhookUrl(e.target.value);}} className={activityWebhookUrl?'ok':''}/>
        </div>
        <div className="info-box">
          <strong>إعداد Make.com:</strong>
          <div style={{marginTop:6}}>1. اعمل Scenario جديد فيه <strong>Webhook → Google Sheets (Add a Row)</strong></div>
          <div>2. الأعمدة في الشيت: <strong>timestamp, date, time, user, username, role, company, action, details</strong></div>
          <div>3. كل عملية في النظام هتتسجل في الشيت تلقائياً ✅</div>
        </div>

        <div style={{marginTop:14,paddingTop:12,borderTop:'1px solid var(--border)'}}>
          <div style={{fontSize:11,fontWeight:700,color:'var(--text2)',marginBottom:8}}>🔄 رابط قراءة السجل من الشيت</div>
          <div style={{fontSize:10,color:'var(--text2)',marginBottom:6,lineHeight:1.6}}>
            عشان كل المستخدمين يشوفوا نفس السجل، اعمل Scenario تاني في Make.com يقرأ من الشيت ويرجع JSON.
          </div>
          <div className="field-row">
            <input type="url" placeholder="https://hook.eu1.make.com/..." value={activityFetchUrl} onChange={function(e){setActivityFetchUrl(e.target.value);}} className={activityFetchUrl?'ok':''}/>
          </div>
          <div className="info-box" style={{background:'#eff6ff',border:'1px solid #bfdbfe'}}>
            <strong>إعداد Scenario القراءة:</strong>
            <div style={{marginTop:6}}>1. Webhook → Google Sheets (<strong>Search Rows</strong>) → Webhook Response</div>
            <div>2. في Webhook Response: ابعت كل الصفوف كـ JSON Array</div>
            <div>3. زرار "🔄 تحديث من Google Sheet" في صفحة السجل هيستخدمه</div>
          </div>
        </div>
      </div>
    </div>

    {/* GOOGLE SHEETS */}
    <div className="setup-card">
      <div className="setup-header">
        <div className={'setup-num '+(sheetId?'done':'')}>{ sheetId?'✓':'2'}</div>
        <span className="setup-title">Google Sheets ID</span>
      </div>
      <div className="setup-body">
        <div className="info-box">من رابط الشيت: docs.google.com/spreadsheets/d/<strong>[SHEET_ID]</strong>/edit</div>
        <div className="field-row"><input placeholder="Sheet ID" value={sheetId} onChange={e=>setSheetId(e.target.value)} className={sheetId?'ok':''}/></div>
      </div>
    </div>

    {/* TELEGRAM */}
    <div className="setup-card">
      <div className="setup-header">
        <div className={'setup-num '+(Object.values(tgIds).some(v=>v)?'done':'')}>{ Object.values(tgIds).some(v=>v)?'✓':'3'}</div>
        <span className="setup-title">Chat IDs جروبات تيليجرام</span>
        <span style={{fontSize:10,color:'var(--text3)'}}>تتحدث تلقائياً لما تضيف شركة</span>
      </div>
      <div className="setup-body">
        <div className="info-box">أضف <strong>@userinfobot</strong> في الجروب وهيبعتلك الـ Chat ID فوراً</div>
        <div className="comp-tg-list">
          {companies.map(c=><div className="comp-tg-row" key={c.id}>
            <div style={{display:'flex',alignItems:'center',gap:7,width:110,flexShrink:0}}>
              <div style={{width:14,height:14,borderRadius:3,background:c.color,flexShrink:0}}/>
              <span className="cl" style={{width:'auto'}}>{c.name}</span>
            </div>
            <input placeholder="-100xxxxxxxxxx" value={tgIds[c.id]||''} onChange={e=>setTgIds(t=>({...t,[c.id]:e.target.value}))} className={tgIds[c.id]?'ok':''}/>
          </div>)}
        </div>
      </div>
    </div>

    {/* Telegram Members Settings */}
    <div className="setup-card">
      <div className="setup-header">
        <div className={'setup-num '+(Object.values(tgMembers).some(v=>v&&v.length>0)?'done':'')}>
          {Object.values(tgMembers).some(v=>v&&v.length>0)?'✓':'👥'}
        </div>
        <span className="setup-title">أعضاء جروبات تيليجرام</span>
        <span style={{fontSize:10,color:'var(--text3)'}}>حدد الأعضاء لكل شركة</span>
      </div>
      <div className="setup-body">
        <div className="info-box">أضف <strong>Telegram Username</strong> لكل عضو بدون @ — مثال: <strong>ahmed_njv</strong></div>
        {companies.map(c=>(
          <TgCompMembers key={c.id} company={c} members={tgMembers[c.id]||[]} setTgMembers={setTgMembers}/>
        ))}
      </div>
    </div>

    {sendLog.length>0&&<div className="setup-card">
      <div className="setup-header"><div className="setup-num">✦</div><span className="setup-title">سجل الإرسال</span></div>
      <div className="send-log">{sendLog.map((l,i)=><div className="log-row" key={i}><span className="log-time">{l.time}</span><span className={l.ok?'log-ok':'log-fail'}>{l.ok?'✓':'✗'}</span><span className="log-msg">{l.msg}</span></div>)}</div>
    </div>}

    {/* COMPANY MODAL */}
    {showCompModal&&<div className="modal-bg" onClick={e=>e.target===e.currentTarget&&setShowCompModal(false)}>
      <div className="modal" style={{width:380}}>
        <h3>{editComp?'تعديل شركة: '+editComp.name:'إضافة شركة جديدة'}</h3>
        <div className="fg"><label>اسم الشركة *</label><input placeholder="مثال: Nokia, NJV, AMC" value={compForm.name} onChange={e=>setCompForm(f=>({...f,name:e.target.value}))} autoFocus/></div>
        <div className="fg">
          <label>لون الشركة</label>
          <div style={{display:'flex',gap:8,flexWrap:'wrap',marginTop:4}}>
            {COMP_COLORS.map(col=><div key={col} onClick={()=>setCompForm(f=>({...f,color:col}))} style={{width:28,height:28,borderRadius:6,background:col,cursor:'pointer',border:compForm.color===col?'3px solid var(--text)':'3px solid transparent',transition:'all .15s'}}/>)}
          </div>
          <div style={{display:'flex',alignItems:'center',gap:8,marginTop:8}}>
            <div style={{width:32,height:32,borderRadius:8,background:compForm.color}}/>
            <span style={{fontSize:11,color:'var(--text2)'}}>اللون المختار: <strong>{compForm.name||'الشركة'}</strong></span>
          </div>
        </div>
        <div className="modal-footer">
          <button className="btn" onClick={()=>setShowCompModal(false)}>إلغاء</button>
          <button className="btn btn-blue" onClick={submitComp} disabled={!compForm.name.trim()}>{editComp?'حفظ التعديلات':'إضافة الشركة'}</button>
        </div>
      </div>
    </div>}
  </>);
}

// ===== MAIN APP =====
function App(){
  const [companies,setCompanies]=usePersistedState('companies',INIT_COMPANIES);
  const [areas,setAreas]=usePersistedState('areas',INIT_AREAS);
  const [scopes,setScopes]=usePersistedState('scopes',INIT_SCOPES);
  const [activityLog,setActivityLog]=useState([]);
  const [users,setUsers]=usePersistedState('users',INIT_USERS);
  const [data,setData]=usePersistedState('data',INIT_DATA);
  const [currentUser,setCurrentUser]=useState(null);
  
  function logActivity(action,details){
    if(!currentUser) return;
    var now=new Date();
    var entry={
      id:Date.now()+Math.random(),
      time:now.toLocaleString('en-GB',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false}),
      user:currentUser.name,
      userId:currentUser.id,
      role:currentUser.role,
      action:action,
      details:details||''
    };
    setActivityLog(function(prev){return [entry].concat(prev);});
    
    // Send to Google Sheets via Make.com webhook
    if(activityWebhookUrl){
      try{
        fetch(activityWebhookUrl,{
          method:'POST',
          mode:'no-cors',
          headers:{'Content-Type':'application/json'},
          body:JSON.stringify({
            timestamp:now.toISOString(),
            date:now.toLocaleDateString('en-GB'),
            time:now.toLocaleTimeString('en-GB',{hour12:false}),
            user:currentUser.name,
            username:currentUser.username,
            userId:currentUser.id,
            role:currentUser.role,
            company:currentUser.company,
            action:action,
            details:details||'',
            userAgent:navigator.userAgent.substring(0,100)
          })
        });
      }catch(e){console.error('Activity log webhook error:',e);}
    }
  }
  const [activePage,setActivePage]=useState('dashboard');
  const [toast,setToast]=useState({msg:'',type:'ok'});
  const [webhookUrl,setWebhookUrl]=usePersistedState('webhookUrl','https://nokiaonetime-bot.onrender.com/webhook');
  const [tgIds,setTgIds]=usePersistedState('tgIds',{});
  const [tgMembers,setTgMembers]=usePersistedState('tgMembers',{});
  const [sheetId,setSheetId]=usePersistedState('sheetId','');

  function showToast(msg,type='ok'){setToast({msg,type});setTimeout(()=>setToast({msg:'',type:'ok'}),3500);}
  function logout(){
    if(currentUser){
      var entry={
        id:Date.now()+Math.random(),
        time:new Date().toLocaleString('en-GB',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false}),
        user:currentUser.name,userId:currentUser.id,role:currentUser.role,
        action:'تسجيل خروج',details:'خرج من النظام'
      };
      setActivityLog(function(prev){return [entry].concat(prev);});
    }
    setCurrentUser(null);
    setActivePage('dashboard');
  }

  // ✅ Auto-Test Backend Connection with Retry
  function testBackendConnection(url, retryCount){
    if(!url || retryCount >= 3){
      if(retryCount >= 3) showToast('❌ فشل الاتصال بالـ Backend بعد 3 محاولات','err');
      return;
    }
    
    const attempt = retryCount + 1;
    showToast('🔄 جاري الاتصال بالـ Backend... (محاولة '+attempt+'/3)');
    
    fetch(url.replace(/\/webhook\/?$/,'/health'))
      .then(function(r){return r.json();})
      .then(function(data){
        if(data.ok && data.pyrogram){
          showToast('✅ الاتصال بالـ Backend ناجح - تيليجرام متصل');
          console.log('✅ Backend connected - Telegram ready');
        }else if(data.ok){
          showToast('⚠️ Backend متصل لكن تيليجرام غير متصل','err');
          console.warn('⚠️ Backend OK but Telegram disconnected');
        }
      })
      .catch(function(e){
        console.error('❌ Backend connection attempt '+attempt+' failed:',e);
        if(retryCount < 2){
          // Retry after 3 seconds
          setTimeout(function(){
            testBackendConnection(url, retryCount+1);
          }, 3000);
        }else{
          showToast('❌ فشل الاتصال بالـ Backend بعد 3 محاولات','err');
        }
      });
  }

  if(!currentUser) return <LoginPage users={users} onLogin={function(u){
    setCurrentUser(u);
    showToast('مرحباً '+u.name+'! 👋');
    var entry={
      id:Date.now()+Math.random(),
      time:new Date().toLocaleString('en-GB',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false}),
      user:u.name,userId:u.id,role:u.role,
      action:'تسجيل دخول',details:'دخل النظام'
    };
    setActivityLog(function(prev){return [entry].concat(prev);});
    
    // ✅ Auto-connect to Backend after login
    if(webhookUrl){
      setTimeout(function(){
        testBackendConnection(webhookUrl, 0);
      }, 1500);
    }
  }}/>;

  const navItems=[
    {key:'dashboard',icon:'📊',label:'الداشبورد',show:true},
    {key:'activity',icon:'📋',label:'سجل النشاطات',show:currentUser.perms.manageUsers||currentUser.perms.edit},
    {key:'users',icon:'👥',label:'المستخدمين',badge:users.length,show:currentUser.perms.manageUsers},
    {key:'scopes',icon:'📋',label:'الـ Scopes',show:currentUser.perms.edit||currentUser.perms.manageUsers},
    {key:'settings',icon:'⚙️',label:'الإعدادات',show:currentUser.perms.settings},
  ].filter(x=>x.show);

  return(
    <div className="shell">
      {toast.msg&&<div className={'toast '+(toast.type==='err'?'toast-err':'toast-ok')}>{toast.msg}</div>}
      <div className="sidebar">
        <div className="sidebar-logo">
          <div className="sidebar-logo-icon">NK</div>
          <div className="sidebar-logo-text">Nokia Tracker</div>
        </div>
        <div className="sidebar-user">
          <div className="user-av" style={{background:currentUser.color}}>{initials(currentUser.name)}</div>
          <div style={{minWidth:0}}>
            <div className="user-av-name">{currentUser.name}</div>
            <div className="user-av-role">{currentUser.role}</div>
          </div>
        </div>
        <div className="sidebar-nav">
          <div className="nav-section">القائمة</div>
          {navItems.map(item=><div key={item.key} className={'nav-item'+(activePage===item.key?' active':'')} onClick={()=>setActivePage(item.key)}>
            <span className="nav-icon">{item.icon}</span>
            <span>{item.label}</span>
            {item.badge&&<span className="nav-badge">{item.badge}</span>}
          </div>)}
        </div>
        <div className="sidebar-footer">
          <button className="logout-btn" onClick={logout}><span>🚪</span><span>تسجيل الخروج</span></button>
        </div>
      </div>
      <div className="main-content">
        {activePage==='dashboard'&&<DashboardPage data={data} setData={setData} currentUser={currentUser} users={users} companies={companies} areas={areas} scopes={scopes} logActivity={logActivity} webhookUrl={webhookUrl} tgIds={tgIds} tgMembers={tgMembers} sheetId={sheetId} showToast={showToast}/>}
        {activePage==='users'&&currentUser.perms.manageUsers&&<UsersPage users={users} setUsers={setUsers} companies={companies} showToast={showToast} logActivity={logActivity}/>}
        {activePage==='activity'&&(currentUser.perms.manageUsers||currentUser.perms.edit)&&<ActivityLogPage activityLog={activityLog} setActivityLog={setActivityLog} users={users} activityFetchUrl={activityFetchUrl} showToast={showToast}/>}
        {activePage==='scopes'&&<ScopesPage data={data} companies={companies} users={users} scopes={scopes}/>}
        {activePage==='settings'&&currentUser.perms.settings&&<SettingsPage companies={companies} setCompanies={setCompanies} areas={areas} setAreas={setAreas} scopes={scopes} setScopes={setScopes} logActivity={logActivity} data={data} showToast={showToast} webhookUrl={webhookUrl} setWebhookUrl={setWebhookUrl} tgIds={tgIds} setTgIds={setTgIds} tgMembers={tgMembers} setTgMembers={setTgMembers} sheetId={sheetId} setSheetId={setSheetId} activityWebhookUrl={activityWebhookUrl} setActivityWebhookUrl={setActivityWebhookUrl} activityFetchUrl={activityFetchUrl} setActivityFetchUrl={setActivityFetchUrl}/>}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);

// ✅ Register Service Worker for PWA
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('service-worker.js')
      .then(reg => console.log('✅ PWA Service Worker registered'))
      .catch(err => console.log('⚠️ Service Worker registration failed:', err));
  });
}

// ✅ Keep-Alive: Ping Backend every 10 minutes to prevent Render sleep
const BACKEND_URL = 'https://nokiaonetime-bot.onrender.com';
const PING_INTERVAL = 10 * 60 * 1000; // 10 minutes

function pingBackend() {
  fetch(BACKEND_URL + '/health')
    .then(res => res.json())
    .then(data => {
      if (data.ok && data.pyrogram) {
        console.log('🟢 Backend alive - Telegram connected');
      } else if (data.ok) {
        console.warn('🟡 Backend alive - Telegram disconnected');
      }
    })
    .catch(err => {
      console.error('🔴 Backend unreachable:', err.message);
    });
}

// Start Keep-Alive on page load
window.addEventListener('load', () => {
  pingBackend(); // First ping immediately
  setInterval(pingBackend, PING_INTERVAL); // Then every 10 min
  console.log('✅ Keep-Alive started: Backend pings every 10 minutes');
});
</script>
</body>
</html>
