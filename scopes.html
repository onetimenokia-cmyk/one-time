<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nokia Tracker — Scopes</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --sidebar-w: 220px;
      --blue: #2563eb; --blue-light: #eff6ff;
      --border: #e5e7eb; --bg: #f0f2f7;
      --white: #ffffff; --text: #111827;
      --text-sec: #6b7280; --text-ter: #9ca3af;
      --red: #dc2626; --green: #059669; --amber: #d97706;
    }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
    .layout { display: flex; min-height: 100vh; }

    /* SIDEBAR */
    .sidebar { width: var(--sidebar-w); background: var(--white); border-right: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; position: fixed; top: 0; left: 0; height: 100vh; overflow-y: auto; z-index: 100; transition: transform 0.25s; }
    .sidebar-brand { padding: 16px; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid var(--border); }
    .brand-logo { width: 34px; height: 34px; border-radius: 8px; background: var(--blue); display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 600; color: #fff; flex-shrink: 0; }
    .brand-name { font-size: 13px; font-weight: 600; color: var(--text); line-height: 1.2; }
    .brand-sub { font-size: 10px; color: var(--text-ter); }
    .sidebar-user { padding: 12px 16px; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid var(--border); }
    .user-avatar { width: 32px; height: 32px; border-radius: 50%; background: var(--blue); display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 600; color: #fff; flex-shrink: 0; }
    .user-name { font-size: 13px; font-weight: 500; color: var(--text); }
    .user-role { font-size: 11px; color: var(--text-ter); }
    .nav { padding: 8px 0; flex: 1; }
    .nav-item { display: flex; align-items: center; gap: 10px; padding: 9px 16px; font-size: 13px; color: var(--text-sec); cursor: pointer; text-decoration: none; transition: background 0.1s, color 0.1s; }
    .nav-item:hover { background: #f9fafb; color: var(--text); }
    .nav-item.active { background: var(--blue-light); color: var(--blue); font-weight: 500; }
    .nav-item i { font-size: 16px; }
    .nav-divider { height: 1px; background: var(--border); margin: 6px 0; }
    .nav-sub { padding-left: 32px; font-size: 12px; }
    .logout { padding: 12px 16px; border-top: 1px solid var(--border); }
    .logout a { font-size: 12px; color: var(--red); cursor: pointer; display: flex; align-items: center; gap: 6px; text-decoration: none; }

    /* MAIN */
    .main { flex: 1; margin-left: var(--sidebar-w); display: flex; flex-direction: column; min-width: 0; }
    .topbar { background: var(--white); border-bottom: 1px solid var(--border); padding: 12px 20px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 50; }
    .topbar-left { display: flex; align-items: center; gap: 10px; }
    .topbar-title { font-size: 16px; font-weight: 600; color: var(--text); }
    .topbar-sub { font-size: 12px; color: var(--text-ter); }
    .menu-btn { display: none; width: 32px; height: 32px; border-radius: 8px; border: 1px solid var(--border); background: var(--white); cursor: pointer; font-size: 18px; color: var(--text-sec); align-items: center; justify-content: center; }

    /* CONTENT */
    .content { padding: 16px 20px; flex: 1; }
    .filters-row { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
    .filter-select { height: 32px; border: 1px solid var(--border); border-radius: 8px; padding: 0 10px; font-size: 12px; color: var(--text); background: var(--white); outline: none; font-family: inherit; }
    .filter-select:focus { border-color: var(--blue); }

    /* SCOPES GRID */
    .scopes-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 14px; }
    .scope-card { background: var(--white); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
    .scope-header { padding: 14px 16px; border-bottom: 1px solid var(--border); }
    .scope-name { font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 2px; }
    .scope-meta { font-size: 12px; color: var(--text-ter); }
    .scope-stats { display: grid; grid-template-columns: repeat(4, 1fr); border-bottom: 1px solid var(--border); }
    .scope-stat { padding: 10px 8px; text-align: center; border-right: 1px solid var(--border); }
    .scope-stat:last-child { border-right: none; }
    .scope-stat-val { font-size: 20px; font-weight: 600; }
    .scope-stat-val.blue { color: var(--blue); }
    .scope-stat-val.amber { color: var(--amber); }
    .scope-stat-val.green { color: var(--green); }
    .scope-stat-val.gray { color: var(--text); }
    .scope-stat-label { font-size: 10px; color: var(--text-ter); margin-top: 2px; }
    .progress-bar { height: 4px; background: #f3f4f6; }
    .progress-fill { height: 100%; background: var(--green); transition: width 0.5s; }
    .scope-companies { padding: 10px 16px; display: flex; gap: 6px; flex-wrap: wrap; border-bottom: 1px solid var(--border); }
    .company-dot { display: flex; align-items: center; gap: 4px; font-size: 11px; color: var(--text-sec); }
    .dot { width: 8px; height: 8px; border-radius: 50%; }

    /* SCOPE TABLE */
    .scope-table { width: 100%; border-collapse: collapse; font-size: 12px; }
    .scope-table th { padding: 7px 12px; text-align: left; font-size: 11px; font-weight: 500; color: var(--text-sec); background: #f9fafb; border-bottom: 1px solid var(--border); }
    .scope-table td { padding: 7px 12px; border-bottom: 1px solid var(--border); color: var(--text); }
    .scope-table tr:last-child td { border-bottom: none; }
    .scope-table tr:hover td { background: #f9fafb; }
    .badge { display: inline-block; padding: 2px 7px; border-radius: 5px; font-size: 11px; font-weight: 500; }
    .badge-done { background: #d1fae5; color: #065f46; }
    .badge-pending { background: #fef3c7; color: #92400e; }
    .badge-notconf { background: #fee2e2; color: #991b1b; }
    .link-id { color: var(--blue); font-size: 11px; font-weight: 500; cursor: pointer; }
    .link-id:hover { text-decoration: underline; }
    .scope-more { padding: 8px 12px; text-align: center; border-top: 1px solid var(--border); }
    .scope-more a { font-size: 11px; color: var(--blue); cursor: pointer; }
    .scope-more a:hover { text-decoration: underline; }

    /* OVERLAY */
    .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.3); z-index: 99; }
    .overlay.show { display: block; }

    @media (max-width: 768px) {
      .sidebar { transform: translateX(-100%); }
      .sidebar.open { transform: translateX(0); }
      .main { margin-left: 0; }
      .scopes-grid { grid-template-columns: 1fr; }
      .menu-btn { display: flex; }
    }
  </style>
</head>
<body>

<div class="overlay" id="overlay" onclick="closeSidebar()"></div>

<div class="layout">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">
      <div class="brand-logo">NT</div>
      <div>
        <div class="brand-name">Nokia Tracker</div>
        <div class="brand-sub">One Time</div>
      </div>
    </div>
    <div class="sidebar-user">
      <div class="user-avatar" id="sidebarAvatar">KB</div>
      <div>
        <div class="user-name" id="sidebarName">Karim BooKa</div>
        <div class="user-role" id="sidebarRole">Admin</div>
      </div>
    </div>
    <nav class="nav">
      <a class="nav-item" href="dashboard.html"><i class="ti ti-layout-dashboard"></i> Dashboard</a>
      <a class="nav-item" href="add-link.html"><i class="ti ti-plus"></i> Add New Link</a>
      <a class="nav-item active" href="scopes.html"><i class="ti ti-topology-star"></i> Scopes</a>
      <a class="nav-item" href="activity-log.html"><i class="ti ti-clipboard-list"></i> Activity Log</a>
      <a class="nav-item" href="tracking.html"><i class="ti ti-hard-hat"></i> Tracking Engineers</a>
      <a class="nav-item" href="users.html"><i class="ti ti-users"></i> Users Management</a>
      <div class="nav-divider"></div>
      <a class="nav-item" href="settings.html"><i class="ti ti-settings"></i> Settings</a>
      <a class="nav-item nav-sub" href="settings.html#partners"><i class="ti ti-users-group"></i> Partners</a>
      <a class="nav-item nav-sub" href="settings.html#regions"><i class="ti ti-map-pin"></i> Regions</a>
      <a class="nav-item nav-sub" href="settings.html#scopes"><i class="ti ti-topology-star"></i> Scopes</a>
      <div class="nav-divider"></div>
      <a class="nav-item" href="settings-system.html"><i class="ti ti-settings-2"></i> Settings System</a>
      <a class="nav-item nav-sub" href="settings-system.html#telegram"><i class="ti ti-brand-telegram"></i> Telegram</a>
      <a class="nav-item nav-sub" href="settings-system.html#google"><i class="ti ti-brand-google"></i> Google</a>
    </nav>
    <div class="logout">
      <a onclick="logout()"><i class="ti ti-logout"></i> Sign Out</a>
    </div>
  </aside>

  <div class="main">
    <div class="topbar">
      <div class="topbar-left">
        <button class="menu-btn" onclick="openSidebar()"><i class="ti ti-menu-2"></i></button>
        <div>
          <div class="topbar-title">Scopes Dashboard</div>
          <div class="topbar-sub" id="topbarSub">Loading...</div>
        </div>
      </div>
    </div>

    <div class="content">
      <div class="filters-row">
        <select class="filter-select" id="filterScope" onchange="applyFilters()">
          <option value="">All Scopes</option>
        </select>
        <select class="filter-select" id="filterPartner" onchange="applyFilters()">
          <option value="">All Partners</option>
        </select>
        <select class="filter-select" id="filterStatus" onchange="applyFilters()">
          <option value="">All Status</option>
          <option value="Done">Done</option>
          <option value="Pending">Pending</option>
          <option value="Not Confirmed">Not Confirmed</option>
        </select>
      </div>
      <div class="scopes-grid" id="scopesGrid">
        <p style="color:var(--text-ter); padding:20px;">Loading scopes...</p>
      </div>
    </div>
  </div>
</div>

<script>
  // AUTH
  const user = JSON.parse(sessionStorage.getItem('nt_user') || 'null');
  if (!user) window.location.href = 'index.html';
  if (user) {
    const initials = user.name.split(' ').map(n=>n[0]).join('').slice(0,2).toUpperCase();
    document.getElementById('sidebarAvatar').textContent = initials;
    document.getElementById('sidebarName').textContent   = user.name;
    document.getElementById('sidebarRole').textContent   = user.role.replace('_',' ');
  }

  // DATA — replace with Google Sheets API
  const ALL_LINKS = [
    { id:'463456',      config:'5654',                     scope:'WBB - Huawei Swap',     region:'Qassim', partner:'NJV',      status:'Pending',       tg:false },
    { id:'N3816-N4517', config:'350 Mbps 0.3m MPT-HQAM',  scope:'WBB - Nokia Expansion', region:'Qassim', partner:'NJV',      status:'Done',          tg:true  },
    { id:'N4717-N4517', config:'700 Mbps 0.6m MPT-HQAM',  scope:'WBB - Nokia Expansion', region:'Qassim', partner:'NJV',      status:'Done',          tg:true  },
    { id:'N4078-N4079', config:'XPIC 350Mbps 28MHz',       scope:'WBB - Nokia Expansion', region:'Tabuk',  partner:'AWTG',     status:'Done',          tg:true  },
    { id:'N4513-N5088', config:'HUW',                      scope:'WBB - Nokia Expansion', region:'Qassim', partner:'CTC',      status:'Done',          tg:true  },
    { id:'N3146-N6280', config:'1.7 Gbps 1.2m MPT-HQAM',  scope:'WBB - Huawei Swap',     region:'Qassim', partner:'NJV',      status:'Pending',       tg:false },
    { id:'N6172-N6167', config:'700 Mbps 0.6m MPT-HQAM',  scope:'WBB - Nokia Expansion', region:'Hail',   partner:'Al-habdan',status:'Done',          tg:true  },
    { id:'N4024-N4023', config:'350 Mbps 0.3m MPT-HQAM',  scope:'WBB - Nokia Expansion', region:'Hail',   partner:'NJV',      status:'Done',          tg:true  },
    { id:'N4792-N4546', config:'HUW',                      scope:'WBB - Nokia Expansion', region:'Qassim', partner:'CTC',      status:'Done',          tg:true  },
    { id:'N3205-N6344', config:'HUW',                      scope:'WBB - Huawei Swap',     region:'Qassim', partner:'NJV',      status:'Pending',       tg:false },
    { id:'N6992-N4285', config:'38GHz 2+0 XPIC 700 Mbps', scope:'WBB - New Site',        region:'Qassim', partner:'AMC',      status:'Done',          tg:true  },
  ];

  const PARTNER_COLORS = {
    'NJV':'#2563eb','CTC':'#059669','AWTG':'#7c3aed',
    'AMC':'#d97706','Al-habdan':'#dc2626','Nu-Era':'#0891b2','MEL':'#6b7280'
  };

  let filteredLinks = [...ALL_LINKS];

  function applyFilters() {
    const scope   = document.getElementById('filterScope').value;
    const partner = document.getElementById('filterPartner').value;
    const status  = document.getElementById('filterStatus').value;
    filteredLinks = ALL_LINKS.filter(l => {
      if (scope   && l.scope   !== scope)   return false;
      if (partner && l.partner !== partner) return false;
      if (status  && l.status  !== status)  return false;
      return true;
    });
    renderScopes();
  }

  function populateFilters() {
    const scopes   = [...new Set(ALL_LINKS.map(l=>l.scope))];
    const partners = [...new Set(ALL_LINKS.map(l=>l.partner))];
    const sSel = document.getElementById('filterScope');
    const pSel = document.getElementById('filterPartner');
    scopes.forEach(s   => sSel.innerHTML += `<option value="${s}">${s}</option>`);
    partners.forEach(p => pSel.innerHTML += `<option value="${p}">${p}</option>`);
  }

  function renderScopes() {
    const scopeNames = [...new Set(filteredLinks.map(l=>l.scope))];
    const grid = document.getElementById('scopesGrid');

    document.getElementById('topbarSub').textContent =
      `${scopeNames.length} Scopes — ${filteredLinks.length} links`;

    if (scopeNames.length === 0) {
      grid.innerHTML = `<p style="color:var(--text-ter);padding:20px;">No scopes found</p>`;
      return;
    }

    grid.innerHTML = scopeNames.map(scopeName => {
      const links   = filteredLinks.filter(l => l.scope === scopeName);
      const total   = links.length;
      const done    = links.filter(l => l.status === 'Done').length;
      const pending = links.filter(l => l.status === 'Pending').length;
      const onTg    = links.filter(l => l.tg).length;
      const pct     = total > 0 ? Math.round((done/total)*100) : 0;

      // partners in this scope
      const partnerMap = {};
      links.forEach(l => {
        if (!partnerMap[l.partner]) partnerMap[l.partner] = {done:0, total:0};
        partnerMap[l.partner].total++;
        if (l.status === 'Done') partnerMap[l.partner].done++;
      });

      const partnerDots = Object.entries(partnerMap).map(([p,v]) =>
        `<div class="company-dot"><div class="dot" style="background:${PARTNER_COLORS[p]||'#888'};"></div> ${p} (${v.done}/${v.total})</div>`
      ).join('');

      // show first 4 links
      const shown = links.slice(0,4);
      const rows = shown.map(l => {
        const badge = l.status==='Done'?'badge-done':l.status==='Pending'?'badge-pending':'badge-notconf';
        return `<tr>
          <td><span class="link-id" onclick="window.location.href='view-link.html?id=${l.id}'">${l.id}</span></td>
          <td>${l.partner}</td>
          <td><span class="badge ${badge}">${l.status}</span></td>
        </tr>`;
      }).join('');

      const moreRow = links.length > 4
        ? `<div class="scope-more"><a onclick="filterScopeTo('${scopeName}')">+ ${links.length-4} more links</a></div>`
        : '';

      return `
        <div class="scope-card">
          <div class="scope-header">
            <div class="scope-name">${scopeName}</div>
            <div class="scope-meta">${total} links — ${pct}% completed</div>
          </div>
          <div class="scope-stats">
            <div class="scope-stat"><div class="scope-stat-val blue">${onTg}</div><div class="scope-stat-label">Telegram</div></div>
            <div class="scope-stat"><div class="scope-stat-val amber">${pending}</div><div class="scope-stat-label">Pending</div></div>
            <div class="scope-stat"><div class="scope-stat-val green">${done}</div><div class="scope-stat-label">Done</div></div>
            <div class="scope-stat"><div class="scope-stat-val gray">${total}</div><div class="scope-stat-label">Total</div></div>
          </div>
          <div class="progress-bar"><div class="progress-fill" style="width:${pct}%;"></div></div>
          <div class="scope-companies">${partnerDots}</div>
          <table class="scope-table">
            <thead><tr><th>Link ID</th><th>Partner</th><th>Status</th></tr></thead>
            <tbody>${rows}</tbody>
          </table>
          ${moreRow}
        </div>`;
    }).join('');
  }

  function filterScopeTo(scopeName) {
    document.getElementById('filterScope').value = scopeName;
    applyFilters();
  }

  function openSidebar()  { document.getElementById('sidebar').classList.add('open');  document.getElementById('overlay').classList.add('show'); }
  function closeSidebar() { document.getElementById('sidebar').classList.remove('open'); document.getElementById('overlay').classList.remove('show'); }
  function logout() { sessionStorage.removeItem('nt_user'); window.location.href = 'index.html'; }

  populateFilters();
  renderScopes();
</script>
</body>
</html>
