<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nokia Tracker — Activity Log</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --sidebar-w: 220px;
      --blue: #2563eb; --blue-light: #eff6ff;
      --border: #e5e7eb; --bg: #f0f2f7;
      --white: #ffffff; --text: #111827;
      --text-sec: #6b7280; --text-ter: #9ca3af;
      --red: #dc2626; --green: #059669; --amber: #d97706;
    }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
    .layout { display: flex; min-height: 100vh; }

    /* SIDEBAR */
    .sidebar { width: var(--sidebar-w); background: var(--white); border-right: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; position: fixed; top: 0; left: 0; height: 100vh; overflow-y: auto; z-index: 100; transition: transform 0.25s; }
    .sidebar-brand { padding: 16px; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid var(--border); }
    .brand-logo { width: 34px; height: 34px; border-radius: 8px; background: var(--blue); display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 600; color: #fff; flex-shrink: 0; }
    .brand-name { font-size: 13px; font-weight: 600; color: var(--text); line-height: 1.2; }
    .brand-sub { font-size: 10px; color: var(--text-ter); }
    .sidebar-user { padding: 12px 16px; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid var(--border); }
    .user-avatar { width: 32px; height: 32px; border-radius: 50%; background: var(--blue); display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 600; color: #fff; flex-shrink: 0; }
    .user-name { font-size: 13px; font-weight: 500; color: var(--text); }
    .user-role { font-size: 11px; color: var(--text-ter); }
    .nav { padding: 8px 0; flex: 1; }
    .nav-item { display: flex; align-items: center; gap: 10px; padding: 9px 16px; font-size: 13px; color: var(--text-sec); cursor: pointer; text-decoration: none; transition: background 0.1s; }
    .nav-item:hover { background: #f9fafb; color: var(--text); }
    .nav-item.active { background: var(--blue-light); color: var(--blue); font-weight: 500; }
    .nav-item i { font-size: 16px; }
    .nav-divider { height: 1px; background: var(--border); margin: 6px 0; }
    .nav-sub { padding-left: 32px; font-size: 12px; }
    .logout { padding: 12px 16px; border-top: 1px solid var(--border); }
    .logout a { font-size: 12px; color: var(--red); cursor: pointer; display: flex; align-items: center; gap: 6px; text-decoration: none; }

    /* MAIN */
    .main { flex: 1; margin-left: var(--sidebar-w); display: flex; flex-direction: column; min-width: 0; }
    .topbar { background: var(--white); border-bottom: 1px solid var(--border); padding: 12px 20px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 50; }
    .topbar-left { display: flex; align-items: center; gap: 10px; }
    .topbar-title { font-size: 16px; font-weight: 600; color: var(--text); }
    .topbar-sub { font-size: 12px; color: var(--text-ter); }
    .btn { display: inline-flex; align-items: center; gap: 6px; padding: 7px 14px; border-radius: 8px; font-size: 13px; cursor: pointer; border: 1px solid var(--border); background: var(--white); color: var(--text); font-family: inherit; transition: background 0.1s; }
    .btn:hover { background: #f9fafb; }
    .menu-btn { display: none; width: 32px; height: 32px; border-radius: 8px; border: 1px solid var(--border); background: var(--white); cursor: pointer; font-size: 18px; color: var(--text-sec); align-items: center; justify-content: center; }

    /* CONTENT */
    .content { padding: 16px 20px; flex: 1; }
    .filters-row { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; align-items: center; }
    .filter-select { height: 32px; border: 1px solid var(--border); border-radius: 8px; padding: 0 10px; font-size: 12px; color: var(--text); background: var(--white); outline: none; font-family: inherit; }
    .filter-select:focus { border-color: var(--blue); }
    .filter-input { height: 32px; border: 1px solid var(--border); border-radius: 8px; padding: 0 10px; font-size: 12px; color: var(--text); background: var(--white); outline: none; font-family: inherit; width: 200px; }
    .filter-input:focus { border-color: var(--blue); }

    /* LOG LIST */
    .log-list { display: flex; flex-direction: column; gap: 8px; }
    .date-divider { display: flex; align-items: center; gap: 10px; margin: 12px 0 6px; }
    .date-divider span { font-size: 12px; font-weight: 500; color: var(--text-ter); white-space: nowrap; }
    .date-divider::before, .date-divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }

    .log-item { background: var(--white); border: 1px solid var(--border); border-radius: 10px; padding: 12px 16px; display: flex; align-items: center; gap: 14px; transition: box-shadow 0.1s; }
    .log-item:hover { box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
    .log-avatar { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 600; color: #fff; flex-shrink: 0; }
    .log-body { flex: 1; min-width: 0; }
    .log-header { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-bottom: 3px; }
    .log-user { font-size: 13px; font-weight: 500; color: var(--text); }
    .log-role { font-size: 11px; color: var(--text-ter); }
    .log-desc { font-size: 13px; color: var(--text-sec); }
    .log-desc strong { color: var(--text); }
    .log-time { font-size: 11px; color: var(--text-ter); white-space: nowrap; flex-shrink: 0; }

    .badge { display: inline-block; padding: 2px 8px; border-radius: 5px; font-size: 11px; font-weight: 500; }
    .badge-login   { background: #d1fae5; color: #065f46; }
    .badge-logout  { background: #fee2e2; color: #991b1b; }
    .badge-add     { background: #dbeafe; color: #1d4ed8; }
    .badge-edit    { background: #fef3c7; color: #92400e; }
    .badge-delete  { background: #fee2e2; color: #991b1b; }
    .badge-send    { background: #ede9fe; color: #5b21b6; }

    .empty-state { text-align: center; padding: 40px; color: var(--text-ter); font-size: 14px; }

    /* OVERLAY */
    .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.3); z-index: 99; }
    .overlay.show { display: block; }

    @media (max-width: 768px) {
      .sidebar { transform: translateX(-100%); }
      .sidebar.open { transform: translateX(0); }
      .main { margin-left: 0; }
      .log-item { flex-wrap: wrap; }
      .menu-btn { display: flex; }
      .filter-input { width: 100%; }
    }
  </style>
</head>
<body>

<div class="overlay" id="overlay" onclick="closeSidebar()"></div>

<div class="layout">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">
      <div class="brand-logo">NT</div>
      <div>
        <div class="brand-name">Nokia Tracker</div>
        <div class="brand-sub">One Time</div>
      </div>
    </div>
    <div class="sidebar-user">
      <div class="user-avatar" id="sidebarAvatar">KB</div>
      <div>
        <div class="user-name" id="sidebarName">Karim BooKa</div>
        <div class="user-role" id="sidebarRole">Admin</div>
      </div>
    </div>
    <nav class="nav">
      <a class="nav-item" href="dashboard.html"><i class="ti ti-layout-dashboard"></i> Dashboard</a>
      <a class="nav-item" href="add-link.html"><i class="ti ti-plus"></i> Add New Link</a>
      <a class="nav-item" href="scopes.html"><i class="ti ti-topology-star"></i> Scopes</a>
      <a class="nav-item active" href="activity-log.html"><i class="ti ti-clipboard-list"></i> Activity Log</a>
      <a class="nav-item" href="tracking.html"><i class="ti ti-hard-hat"></i> Tracking Engineers</a>
      <a class="nav-item" href="users.html"><i class="ti ti-users"></i> Users Management</a>
      <div class="nav-divider"></div>
      <a class="nav-item" href="settings.html"><i class="ti ti-settings"></i> Settings</a>
      <a class="nav-item nav-sub" href="settings.html#partners"><i class="ti ti-users-group"></i> Partners</a>
      <a class="nav-item nav-sub" href="settings.html#regions"><i class="ti ti-map-pin"></i> Regions</a>
      <a class="nav-item nav-sub" href="settings.html#scopes"><i class="ti ti-topology-star"></i> Scopes</a>
      <div class="nav-divider"></div>
      <a class="nav-item" href="settings-system.html"><i class="ti ti-settings-2"></i> Settings System</a>
      <a class="nav-item nav-sub" href="settings-system.html#telegram"><i class="ti ti-brand-telegram"></i> Telegram</a>
      <a class="nav-item nav-sub" href="settings-system.html#google"><i class="ti ti-brand-google"></i> Google</a>
    </nav>
    <div class="logout">
      <a onclick="logout()"><i class="ti ti-logout"></i> Sign Out</a>
    </div>
  </aside>

  <div class="main">
    <div class="topbar">
      <div class="topbar-left">
        <button class="menu-btn" onclick="openSidebar()"><i class="ti ti-menu-2"></i></button>
        <div>
          <div class="topbar-title">Activity Log</div>
          <div class="topbar-sub">Tracking everything that happens in the system</div>
        </div>
      </div>
      <button class="btn" onclick="refreshLog()"><i class="ti ti-refresh"></i> Refresh</button>
    </div>

    <div class="content">
      <div class="filters-row">
        <select class="filter-select" id="filterUser" onchange="renderLog()">
          <option value="">All Users</option>
        </select>
        <select class="filter-select" id="filterType" onchange="renderLog()">
          <option value="">All Activity Types</option>
          <option value="Sign In">Sign In</option>
          <option value="Sign Out">Sign Out</option>
          <option value="Add Link">Add Link</option>
          <option value="Edit Link">Edit Link</option>
          <option value="Delete Link">Delete Link</option>
          <option value="Send to Telegram">Send to Telegram</option>
        </select>
        <input class="filter-input" id="searchLog" placeholder="Search details..." oninput="renderLog()" />
      </div>

      <div id="logContainer"></div>
    </div>
  </div>
</div>

<script>
  // AUTH
  const user = JSON.parse(sessionStorage.getItem('nt_user') || 'null');
  if (!user) window.location.href = 'index.html';
  if (user) {
    const initials = user.name.split(' ').map(n=>n[0]).join('').slice(0,2).toUpperCase();
    document.getElementById('sidebarAvatar').textContent = initials;
    document.getElementById('sidebarName').textContent   = user.name;
    document.getElementById('sidebarRole').textContent   = user.role.replace('_',' ');
  }

  // DATA — replace with Google Sheets API
  const ACTIVITIES = [
    { user:'Karim BooKa', role:'Admin',        color:'#2563eb', type:'Sign In',          desc:'Signed into the system',                                    date:'2026-05-09', time:'17:36:18' },
    { user:'Karim BooKa', role:'Admin',        color:'#2563eb', type:'Add Link',          desc:'Added new link <strong>N3816-N4517</strong> — WBB Nokia Expansion / NJV', date:'2026-05-09', time:'17:10:44' },
    { user:'Helal',       role:'Supervisor',   color:'#059669', type:'Send to Telegram',  desc:'Sent link <strong>N4078-N4079</strong> to Telegram — AWTG', date:'2026-05-09', time:'16:55:02' },
    { user:'Helal',       role:'Supervisor',   color:'#059669', type:'Edit Link',         desc:'Updated status of <strong>N4717-N4517</strong> to <strong>Done</strong>', date:'2026-05-09', time:'15:30:11' },
    { user:'Ahmed NJV',   role:'Company',      color:'#7c3aed', type:'Sign In',           desc:'Signed into the system',                                    date:'2026-05-09', time:'14:20:05' },
    { user:'Karim BooKa', role:'Admin',        color:'#2563eb', type:'Sign Out',          desc:'Signed out of the system',                                  date:'2026-05-09', time:'17:16:05' },
    { user:'Karim BooKa', role:'Admin',        color:'#2563eb', type:'Sign In',           desc:'Signed into the system',                                    date:'2026-05-08', time:'06:11:13' },
    { user:'Omar AMC',    role:'Company',      color:'#d97706', type:'Edit Link',         desc:'Updated photos for link <strong>N6992-N4285</strong>',       date:'2026-05-08', time:'09:44:30' },
    { user:'Helal',       role:'Supervisor',   color:'#059669', type:'Add Link',          desc:'Added new link <strong>N4024-N4023</strong> — WBB Nokia / NJV', date:'2026-05-08', time:'11:20:00' },
    { user:'Karim BooKa', role:'Admin',        color:'#2563eb', type:'Sign Out',          desc:'Signed out of the system',                                  date:'2026-05-08', time:'18:00:00' },
  ];

  const TYPE_BADGES = {
    'Sign In':         'badge-login',
    'Sign Out':        'badge-logout',
    'Add Link':        'badge-add',
    'Edit Link':       'badge-edit',
    'Delete Link':     'badge-delete',
    'Send to Telegram':'badge-send',
  };

  // Populate user filter
  const users = [...new Set(ACTIVITIES.map(a=>a.user))];
  const uSel  = document.getElementById('filterUser');
  users.forEach(u => uSel.innerHTML += `<option value="${u}">${u}</option>`);

  function renderLog() {
    const filterUser = document.getElementById('filterUser').value;
    const filterType = document.getElementById('filterType').value;
    const search     = document.getElementById('searchLog').value.toLowerCase();

    let filtered = ACTIVITIES.filter(a => {
      if (filterUser && a.user !== filterUser) return false;
      if (filterType && a.type !== filterType) return false;
      if (search && !a.desc.toLowerCase().includes(search) && !a.user.toLowerCase().includes(search)) return false;
      return true;
    });

    if (filtered.length === 0) {
      document.getElementById('logContainer').innerHTML =
        `<div class="empty-state"><i class="ti ti-clipboard-x" style="font-size:32px;display:block;margin-bottom:8px;"></i>No activities found</div>`;
      return;
    }

    // Group by date
    const grouped = {};
    filtered.forEach(a => {
      if (!grouped[a.date]) grouped[a.date] = [];
      grouped[a.date].push(a);
    });

    const today     = new Date().toISOString().split('T')[0];
    const yesterday = new Date(Date.now()-86400000).toISOString().split('T')[0];

    let html = '';
    Object.entries(grouped).forEach(([date, items]) => {
      const label = date === today ? 'Today' : date === yesterday ? 'Yesterday' : date;
      const d = new Date(date);
      const formatted = d.toLocaleDateString('en-GB', {day:'2-digit', month:'short', year:'numeric'});
      html += `<div class="date-divider"><span>${label} — ${formatted}</span></div>`;
      html += `<div class="log-list">`;
      items.forEach(a => {
        const initials = a.user.split(' ').map(n=>n[0]).join('').slice(0,2).toUpperCase();
        const badgeClass = TYPE_BADGES[a.type] || 'badge-add';
        html += `
          <div class="log-item">
            <div class="log-avatar" style="background:${a.color};">${initials}</div>
            <div class="log-body">
              <div class="log-header">
                <span class="log-user">${a.user}</span>
                <span class="log-role">(${a.role})</span>
                <span class="badge ${badgeClass}">${a.type}</span>
              </div>
              <div class="log-desc">${a.desc}</div>
            </div>
            <div class="log-time">${a.time}</div>
          </div>`;
      });
      html += `</div>`;
    });

    document.getElementById('logContainer').innerHTML = html;
  }

  function refreshLog() {
    // TODO: fetch from Google Sheets
    renderLog();
    const btn = event.target.closest('button');
    btn.innerHTML = '<i class="ti ti-check" style="color:#059669;"></i> Refreshed';
    setTimeout(() => { btn.innerHTML = '<i class="ti ti-refresh"></i> Refresh'; }, 2000);
  }

  function openSidebar()  { document.getElementById('sidebar').classList.add('open');  document.getElementById('overlay').classList.add('show'); }
  function closeSidebar() { document.getElementById('sidebar').classList.remove('open'); document.getElementById('overlay').classList.remove('show'); }
  function logout() { sessionStorage.removeItem('nt_user'); window.location.href = 'index.html'; }

  renderLog();
</script>
</body>
</html>
